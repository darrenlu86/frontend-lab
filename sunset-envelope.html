<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sunset Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    background-color: #2a1e1a;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .envelope-outer {
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25))
            drop-shadow(0 8px 24px rgba(0,0,0,0.15));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                opacity 0.7s ease;
  }

  .envelope {
    position: relative;
    width: 440px; height: 310px;
    border-radius: 4px;
    z-index: 2;
    perspective: 1000px;
    transform-style: preserve-3d;
  }

  .env-body {
    width: 100%; height: 100%;
    position: relative;
    background: linear-gradient(to bottom, #F0D8B8 0%, #E8B888 35%, #D4956A 70%, #C07850 100%);
    border-radius: 4px;
    overflow: hidden;
  }
  .env-body canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .sunset-glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(255,230,180,0.20) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 60%, rgba(255,180,130,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(200,100,60,0.08) 0%, transparent 40%);
    pointer-events: none; z-index: 1;
  }

  /* Warm inner border glow */
  .inner-glow {
    position: absolute;
    inset: 8px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 2;
    box-shadow:
      inset 0 0 12px rgba(255,200,150,0.15),
      inset 0 0 24px rgba(255,180,130,0.08);
    border: 1px solid rgba(255,210,170,0.12);
  }
  .inner-glow::before {
    content: '';
    position: absolute; inset: -1px;
    border: 1px solid rgba(255,190,140,0.06);
    border-radius: 3px;
  }

  .flap-shadow {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow { opacity: 0; }

  .fold-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .env-flap-wrapper {
    position: absolute;
    inset: 0;
    transform-origin: center top;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, #E8C090 0%, #D09060 100%);
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .env-flap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg,
        rgba(255,230,180,0.12) 0%,
        rgba(255,230,180,0.04) 40%,
        rgba(0,0,0,0.08) 70%,
        rgba(0,0,0,0.14) 100%),
      linear-gradient(to bottom,
        rgba(255,230,180,0.06) 0%,
        rgba(0,0,0,0.04) 38%,
        rgba(0,0,0,0.10) 42%);
    pointer-events: none; z-index: 1;
    transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      linear-gradient(135deg,
        rgba(255,230,180,0.08) 0%,
        rgba(0,0,0,0.10) 30%,
        rgba(0,0,0,0.22) 70%,
        rgba(0,0,0,0.32) 100%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.05) 0%,
        rgba(0,0,0,0.18) 30%,
        rgba(0,0,0,0.28) 42%);
  }

  /* Flap inner glow */
  .flap-inner-glow {
    position: absolute;
    inset: 0;
    clip-path: polygon(2% 2%, 98% 2%, 98% 26%, 50% 39%, 2% 26%);
    pointer-events: none;
    z-index: 2;
    box-shadow:
      inset 0 0 10px rgba(255,200,150,0.12),
      inset 0 0 20px rgba(255,180,130,0.06);
  }
  .flap-inner-glow::before {
    content: '';
    position: absolute;
    inset: 0;
    clip-path: polygon(3% 3%, 97% 3%, 97% 27%, 50% 40%, 3% 27%);
    border: none;
    background:
      repeating-linear-gradient(
        -25deg,
        transparent 0px,
        transparent 6px,
        rgba(255,210,170,0.08) 6px,
        rgba(255,210,170,0.08) 7px
      );
    mask: linear-gradient(to bottom, black 0%, black 26%, transparent 42%);
    -webkit-mask: linear-gradient(to bottom, black 0%, black 26%, transparent 42%);
  }

  /* ======== Sunset glow seal ======== */
  .seal {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  .seal::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.3),
      1px 2px 4px rgba(0,0,0,0.25),
      2px 4px 8px rgba(0,0,0,0.2),
      3px 6px 16px rgba(0,0,0,0.15);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal { opacity: 0; transition: opacity 0.5s ease; }

  .seal-disc {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative; overflow: hidden;
  }
  .seal-disc canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
  }
  .seal-disc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,230,200,0.35) 0%, transparent 45%),
      radial-gradient(ellipse at 70% 75%, rgba(0,0,0,0.08) 0%, transparent 40%);
    pointer-events: none; z-index: 2;
  }
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow:
      inset 5px 5px 6px -2px rgba(0,0,0,0.35),
      inset 3px 3px 4px -1px rgba(0,0,0,0.2);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip {
    position: absolute; inset: 18%; border-radius: 50%;
    pointer-events: none; z-index: 3;
  }
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(212,149,106,0.4);
    pointer-events: none; z-index: 4;
  }
  .seal-ring::before {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(160,130,109,0.2);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
    font-style: italic;
    color: rgba(160,130,109,0.3);
    text-shadow:
      -1px -1px 0 rgba(255,230,200,0.6),
      1px 1px 1px rgba(120,80,50,0.4),
      -1px -1px 2px rgba(255,220,180,0.3),
      1px 1px 3px rgba(100,70,40,0.2);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(212,149,106,0.3);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  .env-text {
    text-align: center;
    color: rgba(245,230,211,0.75);
    font-size: 13.5px; font-weight: 400;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px;
    color: rgba(245,230,211,0.45);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  .card {
    position: absolute;
    width: 396px; padding: 40px 32px;
    border-radius: 2px;
    background-color: #faf6f0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(212,149,106,0.15);
    pointer-events: none;
  }
  .card-border::before {
    content: ''; position: absolute; inset: 4px;
    border: 0.5px solid rgba(212,149,106,0.08);
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,149,106,0.3), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 400;
    color: #3a2a1e; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(212,149,106,0.5);
    letter-spacing: 2px; font-weight: 400;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #6a5545; font-size: 12px;
    font-weight: 400; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(160,130,109,0.25);
    letter-spacing: 4px; text-transform: uppercase;
  }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(245,230,211,0.35);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    font-family: 'Playfair Display', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(245,230,211,0.6); }

  /* Animation Phases */
  .scene.phase-1 .fold-upper { opacity: 0; }
  .scene.phase-1 .env-flap-wrapper { transform: rotateX(40deg); }

  .scene.phase-2 .env-flap-wrapper { transform: rotateX(160deg); opacity: 0; }
  .scene.phase-2 .envelope-outer { transform: translateY(20px) scale(0.96); opacity: 0; }
  .scene.phase-2 .env-text,
  .scene.phase-2 .tap-hint { opacity: 0; }

  .scene.phase-3 .card { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; z-index: 10; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  /* Mobile */
  @media (max-width: 480px) {
    body { background: linear-gradient(to bottom, #F0D8B8, #C07850); background-color: #E8C4A0; }
    .scene { width: 100vw; }
    .envelope-outer { position: fixed; inset: 0; width: 100vw; height: 100dvh; filter: none; }
    .envelope { width: 100%; height: 100%; border-radius: 0; perspective: 1200px; }
    .env-body canvas { border-radius: 0; }
    .inner-glow { inset: 12px; }
    .seal { width: 88px !important; height: 88px !important; }
    .scene.phase-1 .env-flap-wrapper { transform: rotateX(35deg); }
    .scene.phase-2 .env-flap-wrapper { transform: rotateX(150deg); opacity: 0; }
    .scene.phase-2 .envelope-outer { opacity: 0; }
    .env-text { position: fixed !important; bottom: 16vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; font-size: 14px; }
    .tap-hint { position: fixed !important; bottom: 12vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; }
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <div class="envelope-outer">
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <div class="sunset-glow"></div>
      <div class="inner-glow"></div>
    </div>

    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur"><feGaussianBlur stdDeviation="2.2"/></filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.06)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.22)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.42)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28"
               fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>

    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <!-- Wide soft shadow -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(180,120,80,0.12)" stroke-width="1.5" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(180,120,80,0.10)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <!-- Sharp crease -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(255,200,160,0.12)" stroke-width="0.45" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(255,200,160,0.10)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <!-- Highlight -->
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5" stroke="rgba(255,210,170,0.15)" stroke-width="0.3"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5" stroke="rgba(255,210,170,0.12)" stroke-width="0.25"/>
      </g>
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(180,120,80,0.08)" stroke-width="0.8" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(180,120,80,0.06)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(255,200,160,0.08)" stroke-width="0.25" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(255,200,160,0.06)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" stroke="rgba(255,210,170,0.10)" stroke-width="0.2"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" stroke="rgba(255,210,170,0.08)" stroke-width="0.18"/>
      </g>
    </svg>

    <div class="env-flap-wrapper">
      <div class="env-flap">
        <canvas id="flapTex"></canvas>
        <div class="flap-inner-glow"></div>
      </div>
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>

<script>
// ======== Sunset gradient fabric texture ========
function makeSunsetTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Base: Top-to-bottom sunset gradient
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, 'rgb(245,230,211)');
  bg.addColorStop(0.45, `rgb(${baseR},${baseG},${baseB})`);
  bg.addColorStop(1, 'rgb(212,149,106)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Layer 1: Additional gradient overlays at different angles
  ctx.globalCompositeOperation = 'overlay';

  const g1 = ctx.createLinearGradient(0, 0, w, h * 0.6);
  g1.addColorStop(0, 'rgba(255,220,180,0.08)');
  g1.addColorStop(0.5, 'rgba(240,180,130,0.06)');
  g1.addColorStop(1, 'rgba(200,140,100,0.04)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, w, h);

  const g2 = ctx.createLinearGradient(w, 0, 0, h);
  g2.addColorStop(0, 'rgba(255,240,210,0.06)');
  g2.addColorStop(0.5, 'rgba(230,190,150,0.04)');
  g2.addColorStop(1, 'rgba(190,130,90,0.06)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, w, h);

  const g3 = ctx.createLinearGradient(w * 0.5, 0, w * 0.5, h);
  g3.addColorStop(0, 'rgba(255,210,170,0.05)');
  g3.addColorStop(0.3, 'rgba(245,200,160,0.07)');
  g3.addColorStop(0.7, 'rgba(225,170,130,0.05)');
  g3.addColorStop(1, 'rgba(200,140,100,0.03)');
  ctx.fillStyle = g3;
  ctx.fillRect(0, 0, w, h);

  const g4 = ctx.createLinearGradient(0, h * 0.3, w, h * 0.7);
  g4.addColorStop(0, 'rgba(255,230,200,0.04)');
  g4.addColorStop(1, 'rgba(210,160,120,0.06)');
  ctx.fillStyle = g4;
  ctx.fillRect(0, 0, w, h);

  ctx.globalCompositeOperation = 'source-over';

  // Layer 2: Horizontal color banding (fabric weave effect)
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let y = 0; y < h; y++) {
    const bandShift = (y % 3 === 0) ? 3 : (y % 3 === 1) ? -2 : 0;
    // Top-to-bottom gradient boost: lighter/warmer at top, darker/rose at bottom
    const yRatio = y / h;
    const topBoostR = 30 * (1 - yRatio);
    const topBoostG = 20 * (1 - yRatio);
    const topBoostB = 15 * (1 - yRatio);
    const botDarkenR = 30 * yRatio;
    const botDarkenG = 20 * yRatio;
    const botDarkenB = 35 * yRatio;
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x) * 4;
      d[idx] += bandShift + topBoostR - botDarkenR;
      d[idx + 1] += bandShift * 0.7 + topBoostG - botDarkenG;
      d[idx + 2] += bandShift * 0.4 + topBoostB - botDarkenB;
    }
  }

  // Layer 3: Cloud break lighter regions (5-8 large soft radial areas)
  const cloudCount = 5 + Math.floor(Math.random() * 4);
  for (let c = 0; c < cloudCount; c++) {
    const cx = Math.random() * w;
    const cy = Math.random() * h;
    const cr = 40 + Math.random() * 80;
    const brightness = 12 + Math.random() * 20;
    for (let dy = -cr; dy < cr; dy++) {
      for (let dx = -cr; dx < cr; dx++) {
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < cr) {
          const px = Math.floor(cx + dx);
          const py = Math.floor(cy + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const falloff = 1 - dist / cr;
            const v = brightness * falloff * falloff;
            const idx = (py * w + px) * 4;
            d[idx] += v;
            d[idx + 1] += v * 0.85;
            d[idx + 2] += v * 0.6;
          }
        }
      }
    }
  }

  // Layer 4: Fine horizontal-preference noise (fabric weave)
  for (let i = 0; i < d.length; i += 4) {
    const nx = (Math.random() - 0.5) * 10;
    const ny = (Math.random() - 0.5) * 5;
    const warm = Math.random() * 2;
    d[i] += nx + warm;
    d[i + 1] += ny + warm * 0.6;
    d[i + 2] += ny - warm * 0.3;
  }

  // Horizontal-preference streaks
  for (let f = 0; f < 600; f++) {
    const fy = Math.random() * h;
    const fx = Math.random() * w;
    const len = 20 + Math.random() * 50;
    const br = (Math.random() - 0.5) * 12;
    for (let p = 0; p < len; p++) {
      const px = Math.floor(fx + p);
      const py = Math.floor(fy + (Math.random() - 0.5) * 1.5);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const idx = (py * w + px) * 4;
        d[idx] += br;
        d[idx + 1] += br * 0.85;
        d[idx + 2] += br * 0.7;
      }
    }
  }

  // Layer 5: Warm light pools (3-5 large radial gradients)
  const poolCount = 3 + Math.floor(Math.random() * 3);
  for (let p = 0; p < poolCount; p++) {
    const px = Math.random() * w;
    const py = Math.random() * h;
    const pr = 50 + Math.random() * 100;
    const warmth = 5 + Math.random() * 8;
    for (let dy = -pr; dy < pr; dy++) {
      for (let dx = -pr; dx < pr; dx++) {
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pr) {
          const tx = Math.floor(px + dx);
          const ty = Math.floor(py + dy);
          if (tx >= 0 && tx < w && ty >= 0 && ty < h) {
            const falloff = 1 - dist / pr;
            const v = warmth * falloff * falloff;
            const idx = (ty * w + tx) * 4;
            d[idx] += v * 1.2;
            d[idx + 1] += v * 0.8;
            d[idx + 2] += v * 0.4;
          }
        }
      }
    }
  }

  // Layer 6: Vignette (darker edges)
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const nx = (x / w - 0.5) * 2;
      const ny = (y / h - 0.5) * 2;
      const vignette = Math.sqrt(nx * nx + ny * ny);
      const darken = Math.max(0, (vignette - 0.6) * 18);
      const idx = (y * w + x) * 4;
      d[idx] -= darken;
      d[idx + 1] -= darken * 1.1;
      d[idx + 2] -= darken * 1.2;
    }
  }

  ctx.putImageData(img, 0, 0);
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr);
  const sh = Math.ceil(window.innerHeight * dpr);
  makeSunsetTexture(document.getElementById('envTex'), sw, sh, 232, 184, 136);
  makeSunsetTexture(document.getElementById('flapTex'), sw, sh, 208, 144, 96);
} else {
  makeSunsetTexture(document.getElementById('envTex'), 880, 620, 232, 184, 136);
  makeSunsetTexture(document.getElementById('flapTex'), 880, 620, 208, 144, 96);
}

// ======== Sunset glow seal texture ========
(function makeSunsetSeal() {
  const c = document.getElementById('sealTex');
  const size = 176;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size / 2, cy = size / 2, r = size / 2;

  // Base: warm center to rose edges
  const base = ctx.createRadialGradient(
    cx - r * 0.2, cy - r * 0.25, r * 0.05,
    cx + r * 0.1, cy + r * 0.15, r * 1.1
  );
  base.addColorStop(0, '#F5E6D3');
  base.addColorStop(0.25, '#EEDCC4');
  base.addColorStop(0.5, '#E2C4A8');
  base.addColorStop(0.75, '#D4956A');
  base.addColorStop(1, '#A0826D');
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Sunset glow texture noise
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px = (i / 4) % size, py = Math.floor((i / 4) / size);
    const dist = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
    if (dist > r) continue;
    const n = (Math.random() - 0.5) * 10;
    const warm = (Math.random() - 0.5) * 4;
    d[i] += n + warm;
    d[i + 1] += n + warm * 0.5;
    d[i + 2] += n - warm * 0.3;
  }

  // Sparkle points in gold tones
  for (let g = 0; g < 180; g++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * r * 0.9;
    const gx = Math.floor(cx + Math.cos(angle) * dist);
    const gy = Math.floor(cy + Math.sin(angle) * dist);
    if (gx >= 0 && gx < size && gy >= 0 && gy < size) {
      const idx = (gy * size + gx) * 4;
      const spark = Math.random() * 14;
      d[idx] += spark;
      d[idx + 1] += spark * 0.75;
      d[idx + 2] += spark * 0.35;
    }
  }
  ctx.putImageData(img, 0, 0);

  // Edge darkening
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(
    cx - r * 0.15, cy - r * 0.15, r * 0.5,
    cx + r * 0.05, cy + r * 0.05, r
  );
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.4, 'rgba(0,0,0,0.03)');
  edge.addColorStop(0.7, 'rgba(0,0,0,0.10)');
  edge.addColorStop(0.88, 'rgba(0,0,0,0.20)');
  edge.addColorStop(1, 'rgba(0,0,0,0.30)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, size, size);

  // Rim ring
  const rimOuter = ctx.createRadialGradient(cx, cy, r * 0.74, cx, cy, r * 0.86);
  rimOuter.addColorStop(0, 'transparent');
  rimOuter.addColorStop(0.2, 'rgba(255,220,180,0.12)');
  rimOuter.addColorStop(0.5, 'rgba(255,210,170,0.22)');
  rimOuter.addColorStop(0.8, 'rgba(255,220,180,0.10)');
  rimOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = rimOuter;
  ctx.fillRect(0, 0, size, size);
})();

// ======== Interaction ========
const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');

function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}
function closeEnvelope() {
  scene.classList.remove('phase-3', 'phase-2', 'phase-1');
}
seal.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
btn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>
