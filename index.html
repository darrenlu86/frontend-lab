<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
    background-color: #d5ccc6;
    background-image: url('natural-paper.png');
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ======== 信封外殼 — 處理 drop-shadow（不能放在 envelope 上，會破壞 3D） ======== */
  .envelope-outer {
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.06))
            drop-shadow(0 6px 16px rgba(0,0,0,0.04));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                opacity 0.7s ease;
  }

  /* ======== 信封 — 3D 容器 ======== */
  .envelope {
    position: relative;
    width: 440px; height: 310px;
    border-radius: 3px;
    z-index: 2;
    /* 3D 空間：perspective 放在父元素，preserve-3d 讓子元素在同一 3D 空間 */
    perspective: 1000px;
    transform-style: preserve-3d;
  }

  /* 信封底層 */
  .env-body {
    width: 100%; height: 100%;
    position: relative;
    background-color: #c9bdb3;
    border-radius: 3px;
    overflow: hidden;
  }
  .env-body canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /*
    蓋子陰影（光源：左上方）
    用 radial-gradient 讓陰影在 clip-path 邊界前自然消散 → 無硬邊
    被 3D 蓋子遮住，蓋子旋轉後在 3D 空間露出
  */
  .flap-shadow {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow {
    opacity: 0;
  }

  /* V 摺痕 SVG */
  .fold-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  /*
    蓋子 wrapper — 負責 3D 旋轉
    transform-origin: center top = 鉸鏈在頂邊
    transform-style: preserve-3d = 蠟封（子元素）跟著旋轉
    rotateX(正值) = V 尖端往後翻（遠離觀看者）

    不用 filter（會破壞 preserve-3d）
  */
  .env-flap-wrapper {
    position: absolute;
    inset: 0;
    transform-origin: center top;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute;
    inset: 0;
    background-color: #ccc1b6;
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  /* 蓋子的明暗 — 光源左上 */
  .env-flap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      /* 左上亮 → 右下暗 */
      linear-gradient(135deg,
        rgba(255,255,255,0.06) 0%,
        transparent 40%,
        rgba(0,0,0,0.03) 70%,
        rgba(0,0,0,0.06) 100%),
      /* 底邊（V 尖端）略暗 */
      linear-gradient(to bottom,
        transparent 0%,
        rgba(0,0,0,0.02) 38%,
        rgba(0,0,0,0.04) 42%);
    pointer-events: none; z-index: 1;
    transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      /* 翻開時：左上仍受光，右下更暗 */
      linear-gradient(135deg,
        rgba(255,255,255,0.03) 0%,
        rgba(0,0,0,0.04) 30%,
        rgba(0,0,0,0.12) 70%,
        rgba(0,0,0,0.18) 100%),
      /* 底邊加深 */
      linear-gradient(to bottom,
        rgba(0,0,0,0.02) 0%,
        rgba(0,0,0,0.10) 30%,
        rgba(0,0,0,0.16) 42%);
  }

  /* ======== 蠟封 — 蓋子的子元素，自動跟著 3D 旋轉 ======== */
  .seal {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  /* 投射陰影 — 厚度感來自緊貼的接觸陰影 */
  .seal::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    box-shadow:
      /* 接觸陰影：緊貼邊緣，暗示物體坐在表面上有高度 */
      0 1px 1px rgba(0,0,0,0.18),
      1px 2px 2px rgba(0,0,0,0.16),
      /* 近距投射陰影 */
      2px 3px 5px rgba(0,0,0,0.20),
      /* 遠距柔和陰影 */
      3px 5px 12px rgba(0,0,0,0.12);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .seal-disc {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative; overflow: hidden;
  }
  .seal-disc canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
  }
  /* 蠟面覆蓋（凸環和光照已在 canvas 處理） */
  .seal-disc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: none;
    pointer-events: none; z-index: 2;
  }
  /* G 左上 1/4 弧陰影 — 位於 D 內環與 E 盤面之間 */
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow:
      inset 5px 5px 6px -2px rgba(0,0,0,0.38),
      inset 3px 3px 4px -1px rgba(0,0,0,0.22);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip {
    position: absolute; inset: 18%; border-radius: 50%;
    background: none;
    pointer-events: none; z-index: 3;
  }
  /* C 凸環外壁 — 柔和亮線 */
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(255,245,235,0.22);
    pointer-events: none; z-index: 4;
  }
  /* C 凸環內壁 — 柔和暗線 */
  .seal-ring::before {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(100,80,60,0.12);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 400; letter-spacing: 0.5px;
    font-style: italic;
    /* 文字顏色接近蠟面，靠光影區分 */
    color: rgba(170,150,125,0.22);
    text-shadow:
      /* 左上亮邊 — 凸起頂面受光 */
      -1px -1px 0 rgba(255,245,235,0.65),
      /* 右下暗邊 — 凸起投射陰影 */
      1px 1px 1px rgba(70,50,30,0.35),
      /* 柔和擴散 */
      -1px -1px 2px rgba(255,245,235,0.25),
      1px 1px 3px rgba(70,50,30,0.15);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(180,170,160,0.2);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  /* ======== 文字 ======== */
  .env-text {
    text-align: center;
    color: rgba(70,45,35,0.72);
    font-size: 13.5px; font-weight: 300;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px;
    color: rgba(70,45,35,0.48);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* ======== 卡片 ======== */
  .card {
    position: absolute;
    width: 396px; padding: 40px 32px;
    border-radius: 2px;
    background-color: #f5efe8;
    background-image: url('cream-paper.png');
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(190,160,115,0.12);
    pointer-events: none;
  }
  .card-border::before {
    content: ''; position: absolute; inset: 4px;
    border: 0.5px solid rgba(190,160,115,0.06);
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,150,110,0.2), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 300;
    color: #4a3830; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(180,150,110,0.4);
    letter-spacing: 2px; font-weight: 400;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #7a6558; font-size: 12px;
    font-weight: 300; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(138,112,96,0.2);
    letter-spacing: 4px; text-transform: uppercase;
  }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(80,55,45,0.3);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    font-family: 'Cormorant Garamond', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(80,55,45,0.5); }

  /* ============================================================
     開啟動畫
     Phase 1: 上蓋漂浮起來（蠟封跟著一起動），投射陰影
     Phase 2: 上蓋 + 蠟封飄走淡出，信封底層退場
     Phase 3: 卡片進場
     ============================================================ */

  /* Phase 1: 上蓋摺痕淡出，下蓋摺痕保留 */
  .scene.phase-1 .fold-upper {
    opacity: 0;
  }
  .scene.phase-1 .env-flap-wrapper {
    transform: rotateX(40deg);
  }

  /* Phase 2: 蓋子繼續翻到 160° + 淡出，信封退場 */
  .scene.phase-2 .env-flap-wrapper {
    transform: rotateX(160deg);
    opacity: 0;
  }
  .scene.phase-2 .envelope-outer {
    transform: translateY(20px) scale(0.96);
    opacity: 0;
  }
  .scene.phase-2 .env-text,
  .scene.phase-2 .tap-hint { opacity: 0; }

  .scene.phase-3 .card {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: auto; z-index: 10;
  }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  /* ======================================================================
     手機版：全螢幕信封
     ====================================================================== */
  @media (max-width: 480px) {
    body {
      background-color: #c9bdb3;
      background-image: none;
    }
    .scene { width: 100vw; }

    .envelope-outer {
      position: fixed; inset: 0;
      width: 100vw; height: 100dvh;
      filter: none;
    }
    .envelope {
      width: 100%; height: 100%;
      border-radius: 0;
    }
    .env-body canvas { border-radius: 0; }

    .env-body::before {
      content: '';
      position: absolute; inset: 0;
      background: none;
      z-index: 1;
      pointer-events: none;
    }

    /* 紙張層次感 */
    .env-body::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,0.025) 0%,
          rgba(255,255,255,0.015) 38%,
          transparent 42%,
          rgba(0,0,0,0.012) 46%,
          rgba(0,0,0,0.018) 100%),
        linear-gradient(to right,
          rgba(0,0,0,0.008) 0%,
          transparent 20%,
          transparent 80%,
          rgba(0,0,0,0.005) 100%);
      z-index: 1; pointer-events: none;
    }

    /* 蓋子 — 三角形 clip-path，不需要額外調整 */
    .env-flap {
      border-radius: 0;
    }

    /* 蠟封 — 放大 */
    .seal {
      width: 88px !important; height: 88px !important;
    }

    .envelope {
      perspective: 1200px;
    }

    /* Phase 1 */
    .scene.phase-1 .env-flap-wrapper {
      transform: rotateX(35deg);
    }

    /* Phase 2 */
    .scene.phase-2 .env-flap-wrapper {
      transform: rotateX(150deg);
      opacity: 0;
    }
    .scene.phase-2 .envelope-outer {
      opacity: 0;
    }

    /* 文字 */
    .env-text {
      position: fixed !important;
      bottom: 16vh; left: 0; right: 0;
      margin-top: 0 !important; z-index: 6;
      font-size: 14px;
    }
    .tap-hint {
      position: fixed !important;
      bottom: 12vh; left: 0; right: 0;
      margin-top: 0 !important; z-index: 6;
    }

    /* 卡片 */
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <!-- 卡片 -->
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <!-- 信封外殼（處理 drop-shadow） -->
  <div class="envelope-outer">
  <div class="envelope">
    <!-- 底層 -->
    <div class="env-body">
      <canvas id="envTex"></canvas>
    </div>

    <!-- 蓋子陰影 — SVG 模糊 V 形，光源左上 -->
    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur">
          <feGaussianBlur stdDeviation="2.2"/>
        </filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.04)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.18)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.38)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.50)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28"
               fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>

    <!--
      V 摺痕 — 從畫面外以淺角度進入，交會在 42% 高度
      跟之前一樣的自然角度，但更明顯
    -->
    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <!-- 上蓋摺痕（phase-1 淡出） -->
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <line x1="-30" y1="20" x2="50" y2="42"
              stroke="rgba(0,0,0,0.05)" stroke-width="1.5" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42"
              stroke="rgba(0,0,0,0.04)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <line x1="-30" y1="20" x2="50" y2="42"
              stroke="rgba(0,0,0,0.09)" stroke-width="0.45" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42"
              stroke="rgba(0,0,0,0.08)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5"
              stroke="rgba(255,255,255,0.09)" stroke-width="0.3"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5"
              stroke="rgba(255,255,255,0.07)" stroke-width="0.25"/>
      </g>
      <!-- 下蓋摺痕（始終保留） -->
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42"
              stroke="rgba(0,0,0,0.03)" stroke-width="0.8" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42"
              stroke="rgba(0,0,0,0.025)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42"
              stroke="rgba(0,0,0,0.04)" stroke-width="0.25" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42"
              stroke="rgba(0,0,0,0.035)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4"
              stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4"
              stroke="rgba(255,255,255,0.05)" stroke-width="0.18"/>
      </g>
    </svg>

    <!-- 上蓋 wrapper — 3D 旋轉容器，蠟封跟著轉 -->
    <div class="env-flap-wrapper">
      <div class="env-flap">
        <canvas id="flapTex"></canvas>
      </div>
      <!-- 蠟封在 wrapper 裡，自動跟著 3D 旋轉 -->
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div><!-- .envelope -->
  </div><!-- .envelope-outer -->

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>

<script>
// ======== 紙張紋理 ========
function makePaperTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, w, h);

  const g = ctx.createLinearGradient(0, 0, w * 0.4, h);
  g.addColorStop(0, 'rgba(255,255,255,0.03)');
  g.addColorStop(1, 'rgba(0,0,0,0.02)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 22;
    d[i] += n; d[i+1] += n; d[i+2] += n;
  }
  for (let f = 0; f < 1200; f++) {
    const fx = Math.random() * w, fy = Math.random() * h;
    const len = 8 + Math.random() * 35;
    const br = (Math.random() - 0.5) * 18;
    for (let p = 0; p < len; p++) {
      const px = Math.floor(fx + p + (Math.random() - 0.5) * 2);
      const py = Math.floor(fy + (Math.random() - 0.5) * 1.5);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const idx = (py * w + px) * 4;
        d[idx] += br; d[idx+1] += br; d[idx+2] += br;
      }
    }
  }
  for (let b = 0; b < 50; b++) {
    const bx = Math.random() * w, by = Math.random() * h;
    const bR = 12 + Math.random() * 40;
    const bBr = (Math.random() - 0.5) * 10;
    for (let dy = -bR; dy < bR; dy++) {
      for (let dx = -bR; dx < bR; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bR) {
          const px = Math.floor(bx + dx), py = Math.floor(by + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const falloff = 1 - dist / bR;
            const idx = (py * w + px) * 4;
            const v = bBr * falloff * falloff;
            d[idx] += v; d[idx+1] += v; d[idx+2] += v;
          }
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr);
  const sh = Math.ceil(window.innerHeight * dpr);
  makePaperTexture(document.getElementById('envTex'), sw, sh, 201, 189, 179);
  makePaperTexture(document.getElementById('flapTex'), sw, sh, 206, 195, 184);
} else {
  makePaperTexture(document.getElementById('envTex'), 880, 620, 201, 189, 179);
  makePaperTexture(document.getElementById('flapTex'), 880, 620, 206, 195, 184);
}

// ======== 蠟封紋理 ========
(function makeWaxSeal() {
  const c = document.getElementById('sealTex');
  const size = 176;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // ===== 圓頂光照漸層 =====
  // 內圓偏左上（光源方向，亮），外圓偏右下（背光，暗）
  const base = ctx.createRadialGradient(
    cx - r*0.3, cy - r*0.35, r*0.05,
    cx + r*0.1, cy + r*0.2,  r*1.1
  );
  base.addColorStop(0,    '#f2e6da');  // 受光最亮
  base.addColorStop(0.25, '#ecdcce');
  base.addColorStop(0.5,  '#e2d2c2');
  base.addColorStop(0.75, '#d8c6b4');
  base.addColorStop(1,    '#ccbaa8');  // 背光最暗
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();

  // ===== 細微蠟面紋理 =====
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % size, py = Math.floor((i/4) / size);
    const dist = Math.sqrt((px-cx)**2 + (py-cy)**2);
    if (dist > r) continue;
    const n = (Math.random() - 0.5) * 8;
    const warm = (Math.random() - 0.5) * 2;
    d[i] += n + warm; d[i+1] += n; d[i+2] += n - warm;
  }
  for (let g = 0; g < 120; g++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * r * 0.85;
    const gx = Math.floor(cx + Math.cos(angle) * dist);
    const gy = Math.floor(cy + Math.sin(angle) * dist);
    if (gx >= 0 && gx < size && gy >= 0 && gy < size) {
      const idx = (gy * size + gx) * 4;
      const v = (Math.random() - 0.5) * 6;
      d[idx] += v; d[idx+1] += v; d[idx+2] += v;
    }
  }
  ctx.putImageData(img, 0, 0);

  // ===== 邊緣暗化（B 外緣）— 圓心偏左上，讓右下邊緣更暗 =====
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(
    cx - r*0.18, cy - r*0.18, r*0.55,
    cx + r*0.05, cy + r*0.05, r
  );
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.4, 'rgba(0,0,0,0.02)');
  edge.addColorStop(0.7, 'rgba(0,0,0,0.08)');
  edge.addColorStop(0.88, 'rgba(0,0,0,0.16)');
  edge.addColorStop(1, 'rgba(0,0,0,0.28)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, size, size);

  // ===== 盤面壓暗（E 區域）— 凹下去的中央區域比凸環暗 =====
  const dish = ctx.createRadialGradient(cx, cy, 0, cx, cy, r*0.72);
  dish.addColorStop(0, 'rgba(0,0,0,0.07)');
  dish.addColorStop(0.7, 'rgba(0,0,0,0.06)');
  dish.addColorStop(1, 'transparent');
  ctx.fillStyle = dish;
  ctx.fillRect(0, 0, size, size);

  // ===== 凸環（C）— 頂面受光，比盤面亮 =====
  const rimOuter = ctx.createRadialGradient(cx, cy, r*0.74, cx, cy, r*0.86);
  rimOuter.addColorStop(0, 'transparent');
  rimOuter.addColorStop(0.2, 'rgba(255,255,255,0.10)');
  rimOuter.addColorStop(0.4, 'rgba(255,255,255,0.20)');
  rimOuter.addColorStop(0.6, 'rgba(255,255,255,0.20)');
  rimOuter.addColorStop(0.8, 'rgba(255,255,255,0.08)');
  rimOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = rimOuter;
  ctx.fillRect(0, 0, size, size);

  // ===== 凸環內側陰影 — C→E 的落差暗帶 =====
  const rimInner = ctx.createRadialGradient(cx, cy, r*0.66, cx, cy, r*0.75);
  rimInner.addColorStop(0, 'transparent');
  rimInner.addColorStop(0.4, 'rgba(0,0,0,0.05)');
  rimInner.addColorStop(0.7, 'rgba(0,0,0,0.09)');
  rimInner.addColorStop(1, 'transparent');
  ctx.fillStyle = rimInner;
  ctx.fillRect(0, 0, size, size);
})();

// ======== 互動 ========
const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');

function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}

function closeEnvelope() {
  scene.classList.remove('phase-3', 'phase-2', 'phase-1');
}

seal.addEventListener('click', e => {
  e.stopPropagation();
  openEnvelope();
});
btn.addEventListener('click', e => {
  e.stopPropagation();
  closeEnvelope();
});
</script>
