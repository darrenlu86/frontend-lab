<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
    background-color: #d5ccc6;
    background-image: url('natural-paper.png');
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 340px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ======== 信封 (封閉時就是一個長方形) ======== */
  .envelope {
    position: relative;
    width: 340px; height: 240px;
    z-index: 2;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.06))
            drop-shadow(0 6px 16px rgba(0,0,0,0.04));
  }

  /* ======== 手機版：整個螢幕就是信封正面特寫 ======== */
  @media (max-width: 480px) {
    body {
      background-color: #c9bdb3;
      background-image: none;
    }
    .scene { width: 100vw; }

    /* 信封 = 整個螢幕 */
    .envelope {
      position: fixed; inset: 0;
      width: 100vw; height: 100dvh;
      filter: none;
      perspective: 800px;
    }
    .env-body { border-radius: 0; }
    .env-body canvas { border-radius: 0; }

    .env-body::before {
      background: none !important;
      z-index: 1;
    }
    /* SVG 摺痕 */
    .fold-lines {
      display: block !important;
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    /*
      四條摺痕各有不同深淺：
      - 上方左線 (左上→中心)：最深，翻蓋壓在最上面
      - 上方右線 (右上→中心)：次深
      - 下方左線 (左下→中心)：淺，底折在最下層
      - 下方右線 (右下→中心)：最淺
      每條線旁邊有亮邊(高光)模擬紙張凸起
    */
    .fold-top-l {
      stroke: rgba(0,0,0,0.07);
      stroke-width: 0.35;
    }
    .fold-top-r {
      stroke: rgba(0,0,0,0.06);
      stroke-width: 0.3;
    }
    .fold-bot-l {
      stroke: rgba(0,0,0,0.04);
      stroke-width: 0.25;
    }
    .fold-bot-r {
      stroke: rgba(0,0,0,0.035);
      stroke-width: 0.2;
    }
    /* 每條暗線旁的高光線 — 紙張凸起的亮邊 */
    .fold-highlight {
      stroke: rgba(255,255,255,0.06);
      stroke-width: 0.2;
    }
    .fold-highlight-strong {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 0.25;
    }

    /* 紙張層次：翻蓋區微亮、下方區微暗 */
    .env-body::after {
      content: '' !important;
      position: absolute !important;
      inset: 0 !important;
      background:
        /* 翻蓋區域微亮（上層紙蓋住下層）*/
        linear-gradient(to bottom,
          rgba(255,255,255,0.025) 0%,
          rgba(255,255,255,0.015) 38%,
          transparent 42%,
          rgba(0,0,0,0.012) 46%,
          rgba(0,0,0,0.018) 100%),
        /* 左右側翼的微妙明暗差 */
        linear-gradient(to right,
          rgba(0,0,0,0.008) 0%,
          transparent 20%,
          transparent 80%,
          rgba(0,0,0,0.005) 100%) !important;
      z-index: 1;
      pointer-events: none;
      border-radius: 0 !important;
    }

    /* 壓印 — 放大，在螢幕中央偏上 */
    .seal {
      top: 42% !important; left: 50% !important;
      transform: translate(-50%, -50%) !important;
      width: 88px !important; height: 88px !important;
    }
    .scene.opened .seal {
      transform: translate(-50%, -50%) scale(0) !important;
    }

    /* 翻蓋 */
    .flap { width: 100vw; height: 55vh; }

    /* 文字 */
    .env-text {
      position: fixed !important;
      bottom: 16vh; left: 0; right: 0;
      margin-top: 0 !important; z-index: 6;
      font-size: 14px;
    }
    .tap-hint {
      position: fixed !important;
      bottom: 12vh; left: 0; right: 0;
      margin-top: 0 !important; z-index: 6;
    }

    /* 卡片 */
    .card { width: 88vw; max-width: 360px; }
  }

  /* 信封本體 — 就是整個長方形 */
  .env-body {
    width: 100%; height: 100%;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    background-color: #c9bdb3;
  }
  /* canvas 紋理圖層 */
  .env-body canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 2px;
  }
  /* SVG 摺痕線 — 桌面版隱藏 */
  .fold-lines { display: none; }
  /* 淡淡的摺線裝飾 */
  .env-body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom right, transparent 49.4%, rgba(0,0,0,0.02) 50%, transparent 50.6%),
      linear-gradient(to bottom left,  transparent 49.4%, rgba(0,0,0,0.02) 50%, transparent 50.6%);
    pointer-events: none;
    z-index: 1;
  }

  /* 翻蓋 — 桌面版封閉時隱藏 (scaleY=0)，手機版直接顯示 */
  .flap {
    position: absolute;
    bottom: 100%; left: 0;
    width: 100%; height: 195px;
    clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
    background-color: #c9bdb3;
    transform-origin: bottom center;
    transform: scaleY(0);
    z-index: 1;
    overflow: hidden;
    perspective: 800px;
  }
  .flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .flap::after {
    content: '';
    position: absolute; inset: 0;
    clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
    background: linear-gradient(to top, transparent 40%, rgba(0,0,0,0.03) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* 蠟封 */
  .seal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    z-index: 5; cursor: pointer;
  }
  .seal-disc {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative;
    overflow: hidden;
  }
  /* Canvas 產生的蠟質紋理 */
  .seal-disc canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
  }
  /* 頂部高光 — 模擬蠟面反光 */
  .seal-disc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse at 35% 28%, rgba(255,255,255,0.35) 0%, transparent 40%),
      radial-gradient(ellipse at 65% 70%, rgba(0,0,0,0.06) 0%, transparent 35%);
    pointer-events: none;
    z-index: 2;
  }
  /* 立體感 — 外圍凸起 + 中心凹陷的「壓印」感 */
  .seal-shadow {
    position: absolute; inset: 0; border-radius: 50%;
    box-shadow:
      /* 外部投射陰影 — 壓印凸出紙面 */
      0 2px 6px rgba(0,0,0,0.12),
      0 4px 12px rgba(0,0,0,0.06),
      /* 外圈凸起的亮邊（上方受光）*/
      inset 0 3px 4px rgba(255,255,255,0.45),
      inset 0 5px 8px rgba(255,255,255,0.15),
      /* 外圈凸起的暗邊（下方背光）*/
      inset 0 -3px 5px rgba(0,0,0,0.12),
      inset 0 -5px 10px rgba(0,0,0,0.05),
      /* 左右立體感 */
      inset 3px 0 4px rgba(255,255,255,0.12),
      inset -3px 0 4px rgba(0,0,0,0.06);
    pointer-events: none;
    z-index: 3;
  }
  /* 中心凹陷 — 壓下去的區域比外圈暗 */
  .seal-center-dip {
    position: absolute;
    inset: 15%; border-radius: 50%;
    box-shadow:
      /* 凹陷的內陰影 */
      inset 0 2px 4px rgba(0,0,0,0.08),
      inset 0 -1px 2px rgba(255,255,255,0.2);
    background: radial-gradient(circle,
      rgba(0,0,0,0.03) 0%,
      transparent 70%);
    pointer-events: none;
    z-index: 3;
  }
  /* 內圈壓痕 */
  .seal-ring {
    position: absolute; inset: 7px; border-radius: 50%;
    border: 0.8px solid rgba(200,195,188,0.4);
    box-shadow:
      0 0.5px 0 rgba(255,255,255,0.25),
      inset 0 0.5px 0 rgba(0,0,0,0.06);
    pointer-events: none;
    z-index: 4;
  }
  .seal-ring::before {
    content: '';
    position: absolute; inset: 3px; border-radius: 50%;
    border: 0.5px solid rgba(200,195,188,0.25);
  }
  /* 凹刻文字 */
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
    color: rgba(160,150,140,0.35);
    text-shadow:
      0 -0.5px 0 rgba(0,0,0,0.06),
      0 1px 0 rgba(255,255,255,0.35);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(180,170,160,0.2);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  /* 文字 */
  .env-text {
    text-align: center;
    color: rgba(80,55,45,0.35);
    font-size: 13.5px; font-weight: 300;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease 1.5s;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px;
    color: rgba(80,55,45,0.2);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease 1.5s;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* 卡片 */
  .card {
    position: absolute;
    width: 306px; padding: 36px 28px;
    border-radius: 2px;
    background-color: #f5efe8;
    background-image: url('cream-paper.png');
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease 2s,
                transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94) 2s;
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(190,160,115,0.12);
    pointer-events: none;
  }
  .card-border::before {
    content: ''; position: absolute; inset: 4px;
    border: 0.5px solid rgba(190,160,115,0.06);
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,150,110,0.2), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 300;
    color: #4a3830; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(180,150,110,0.4);
    letter-spacing: 2px; font-weight: 400;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #7a6558; font-size: 12px;
    font-weight: 300; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(138,112,96,0.2);
    letter-spacing: 4px; text-transform: uppercase;
  }

  /* Close */
  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(80,55,45,0.3);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease 2.2s;
    font-family: 'Cormorant Garamond', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(80,55,45,0.5); }

  /* ======== 開啟動畫 — 分四階段 ========
     0.0s  蠟封消失
     0.3s  三角翻蓋從頂部「展開」(scaleY 0→1)
     1.0s  翻蓋向後翻 (rotateX)
     1.5s  信封整體淡出下移
     2.0s  卡片淡入
  ======== */

  /* 翻蓋展開 + 翻轉 */
  .scene.opened .flap {
    animation: flapOpen 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes flapOpen {
    0% {
      transform: scaleY(0);
    }
    /* 0~35%: 翻蓋展開，從頂部長出來 */
    35% {
      transform: scaleY(1) rotateX(0deg);
    }
    /* 35~100%: 翻蓋向後翻開 */
    100% {
      transform: scaleY(1) rotateX(170deg);
    }
  }

  /* 蠟封消失 */
  .scene.opened .seal {
    transition: transform 0.4s ease, opacity 0.3s ease;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0; pointer-events: none;
  }
  .scene.opened .seal-pulse { animation: none; opacity: 0; }

  /* 信封本體退場 */
  .scene.opened .envelope {
    transition: transform 0.6s ease 1.5s, opacity 0.5s ease 1.5s;
    transform: translateY(30px) scale(0.95);
    opacity: 0;
  }

  /* 卡片進場 */
  .scene.opened .card {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
    z-index: 10;
  }

  /* 文字淡出 */
  .scene.opened .env-text,
  .scene.opened .tap-hint { opacity: 0; }

  /* Close */
  .scene.opened .close-btn { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <!-- 卡片 -->
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <!-- 信封 -->
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <!-- 信封摺痕 SVG -->
      <svg class="fold-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <filter id="foldBlur"><feGaussianBlur stdDeviation="0.12"/></filter>
          <filter id="foldBlurWide"><feGaussianBlur stdDeviation="0.3"/></filter>
        </defs>
        <!--
          特寫視角：只看到信封中間段，摺痕角度很平緩
          信封比螢幕寬很多，所以線從螢幕左/右邊緣外延伸進來
          交會點在螢幕 42% 高度處

          上方兩條線（翻蓋邊緣）：從畫面外左上/右上，以淺角度進入
          下方兩條線（底折邊緣）：從畫面外左下/右下，以淺角度進入
        -->

        <!-- 寬柔陰影 -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.03)" stroke-width="1.2" filter="url(#foldBlurWide)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.025)" stroke-width="1.0" filter="url(#foldBlurWide)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.018)" stroke-width="0.8" filter="url(#foldBlurWide)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.015)" stroke-width="0.7" filter="url(#foldBlurWide)"/>

        <!-- 銳利摺痕線 -->
        <line x1="-30" y1="20" x2="50" y2="42" class="fold-top-l" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" class="fold-top-r" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80" x2="50" y2="42" class="fold-bot-l" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" class="fold-bot-r" filter="url(#foldBlur)"/>

        <!-- 高光線 -->
        <line x1="-30" y1="19.6" x2="50.2" y2="41.6" class="fold-highlight-strong"/>
        <line x1="130" y1="19.6" x2="49.8" y2="41.6" class="fold-highlight"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" class="fold-highlight"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" class="fold-highlight"/>
      </svg>
    </div>
    <div class="flap"><canvas id="flapTex"></canvas></div>
    <div class="seal" id="seal">
      <div class="seal-pulse"></div>
      <div class="seal-disc">
        <canvas id="sealTex"></canvas>
        <div class="seal-shadow"></div>
        <div class="seal-center-dip"></div>
        <div class="seal-ring"></div>
        <div class="seal-text">Y &amp; W</div>
      </div>
    </div>
  </div>

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>

<script>
// ======== 紙張紋理產生器 ========
function makePaperTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  // 底色
  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, w, h);

  // 微妙漸層
  const g = ctx.createLinearGradient(0, 0, w * 0.4, h);
  g.addColorStop(0, 'rgba(255,255,255,0.03)');
  g.addColorStop(1, 'rgba(0,0,0,0.02)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  // Layer 1: 細微噪點
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 22;
    d[i] += n; d[i+1] += n; d[i+2] += n;
  }

  // Layer 2: 纖維線條（水平偏向）
  for (let f = 0; f < 1200; f++) {
    const fx = Math.random() * w;
    const fy = Math.random() * h;
    const len = 8 + Math.random() * 35;
    const br = (Math.random() - 0.5) * 18;
    for (let p = 0; p < len; p++) {
      const px = Math.floor(fx + p + (Math.random() - 0.5) * 2);
      const py = Math.floor(fy + (Math.random() - 0.5) * 1.5);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const idx = (py * w + px) * 4;
        d[idx] += br; d[idx+1] += br; d[idx+2] += br;
      }
    }
  }

  // Layer 3: 柔和斑塊
  for (let b = 0; b < 50; b++) {
    const bx = Math.random() * w;
    const by = Math.random() * h;
    const bR = 12 + Math.random() * 40;
    const bBr = (Math.random() - 0.5) * 10;
    for (let dy = -bR; dy < bR; dy++) {
      for (let dx = -bR; dx < bR; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bR) {
          const px = Math.floor(bx + dx);
          const py = Math.floor(by + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const falloff = 1 - dist / bR;
            const idx = (py * w + px) * 4;
            const v = bBr * falloff * falloff;
            d[idx] += v; d[idx+1] += v; d[idx+2] += v;
          }
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);
}

// 根據螢幕大小決定紋理尺寸
const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

if (isMobile) {
  // 手機：信封 = 整個螢幕
  const sw = Math.ceil(window.innerWidth * dpr);
  const sh = Math.ceil(window.innerHeight * dpr);
  makePaperTexture(document.getElementById('envTex'), sw, sh, 201, 189, 179);
  // 翻蓋撐滿螢幕寬
  const flapH = Math.ceil(window.innerHeight * 0.55 * dpr);
  makePaperTexture(document.getElementById('flapTex'), sw, flapH, 201, 189, 179);
} else {
  // 桌面：固定尺寸
  makePaperTexture(document.getElementById('envTex'), 680, 480, 201, 189, 179);
  makePaperTexture(document.getElementById('flapTex'), 680, 390, 201, 189, 179);
}

// ======== 蠟封(印泥)紋理 ========
(function makeWaxSeal() {
  const c = document.getElementById('sealTex');
  const size = isMobile ? 176 : 120; // 手機 88*2, 桌面 60*2
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // 底色漸層 — 白色/奶油色，像真實印泥
  const base = ctx.createRadialGradient(cx-8, cy-10, 5, cx, cy, r);
  base.addColorStop(0, '#ece7e1');
  base.addColorStop(0.3, '#e2dbd3');
  base.addColorStop(0.6, '#d6cdc4');
  base.addColorStop(1, '#c8bdb2');
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();

  // 蠟質噪點 — 比紙張更密更細
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % size, py = Math.floor((i/4) / size);
    const dist = Math.sqrt((px-cx)**2 + (py-cy)**2);
    if (dist > r) continue;
    // 細微彩色噪點 — 模擬蠟的不均勻
    const n = (Math.random() - 0.5) * 16;
    const warm = (Math.random() - 0.5) * 4; // 微暖色偏移
    d[i] += n + warm;
    d[i+1] += n;
    d[i+2] += n - warm;
  }

  // 小顆粒感 — 模擬印泥表面的微粒
  for (let g = 0; g < 300; g++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * r * 0.9;
    const gx = Math.floor(cx + Math.cos(angle) * dist);
    const gy = Math.floor(cy + Math.sin(angle) * dist);
    if (gx >= 0 && gx < size && gy >= 0 && gy < size) {
      const idx = (gy * size + gx) * 4;
      const v = (Math.random() - 0.5) * 25;
      d[idx] += v; d[idx+1] += v; d[idx+2] += v;
      // 周圍一圈也加
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = gx+dx, ny = gy+dy;
          if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
            const ni = (ny * size + nx) * 4;
            d[ni] += v*0.4; d[ni+1] += v*0.4; d[ni+2] += v*0.4;
          }
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);

  // 邊緣壓痕 — 印泥壓下去邊緣會稍微凸起
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(cx, cy, r*0.82, cx, cy, r);
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.5, 'rgba(0,0,0,0.04)');
  edge.addColorStop(0.8, 'rgba(255,255,255,0.08)');
  edge.addColorStop(1, 'rgba(0,0,0,0.06)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, size, size);
})();

// ======== 互動 ========
const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');

seal.addEventListener('click', e => {
  e.stopPropagation();
  scene.classList.add('opened');
});
btn.addEventListener('click', e => {
  e.stopPropagation();
  scene.classList.remove('opened');
});
</script>
