<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wood Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'EB Garamond', 'Noto Serif TC', serif;
    background-color: #3a2e22;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .envelope-outer {
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2))
            drop-shadow(0 8px 28px rgba(0,0,0,0.12));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                opacity 0.7s ease;
  }

  .envelope {
    position: relative;
    width: 440px; height: 310px;
    border-radius: 3px;
    z-index: 2;
    perspective: 1000px;
    transform-style: preserve-3d;
  }

  .env-body {
    width: 100%; height: 100%;
    position: relative;
    background-color: #8b6e4e;
    border-radius: 3px;
    overflow: hidden;
  }
  .env-body canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* 木框邊 */
  .wood-frame {
    position: absolute;
    inset: 0;
    border: 3px solid rgba(60,40,20,0.3);
    border-radius: 3px;
    pointer-events: none;
    z-index: 2;
  }
  .wood-frame::before {
    content: '';
    position: absolute; inset: 0;
    border: 1px solid rgba(180,150,100,0.12);
  }

  .flap-shadow {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow { opacity: 0; }

  .fold-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .env-flap-wrapper {
    position: absolute;
    inset: 0;
    transform-origin: center top;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute;
    inset: 0;
    background-color: #a88868;
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .env-flap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg,
        rgba(255,240,200,0.10) 0%,
        rgba(255,240,200,0.03) 40%,
        rgba(0,0,0,0.06) 70%,
        rgba(0,0,0,0.12) 100%),
      linear-gradient(to bottom,
        rgba(255,240,200,0.05) 0%,
        rgba(0,0,0,0.03) 38%,
        rgba(0,0,0,0.08) 42%);
    pointer-events: none; z-index: 1;
    transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      linear-gradient(135deg,
        rgba(255,240,200,0.06) 0%,
        rgba(0,0,0,0.08) 30%,
        rgba(0,0,0,0.20) 70%,
        rgba(0,0,0,0.28) 100%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.04) 0%,
        rgba(0,0,0,0.16) 30%,
        rgba(0,0,0,0.24) 42%);
  }

  /* ======== 燒印蠟封 ======== */
  .seal {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  .seal::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.2),
      1px 2px 3px rgba(0,0,0,0.18),
      2px 3px 6px rgba(0,0,0,0.15),
      3px 5px 14px rgba(0,0,0,0.10);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal { opacity: 0; transition: opacity 0.5s ease; }

  .seal-disc {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative; overflow: hidden;
  }
  .seal-disc canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
  }
  .seal-disc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse at 35% 28%, rgba(255,240,200,0.2) 0%, transparent 40%),
      radial-gradient(ellipse at 65% 72%, rgba(0,0,0,0.06) 0%, transparent 35%);
    pointer-events: none; z-index: 2;
  }
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow:
      inset 5px 5px 6px -2px rgba(0,0,0,0.30),
      inset 3px 3px 4px -1px rgba(0,0,0,0.18);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip {
    position: absolute; inset: 18%; border-radius: 50%;
    pointer-events: none; z-index: 3;
  }
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(200,170,120,0.2);
    pointer-events: none; z-index: 4;
  }
  .seal-ring::before {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(60,40,20,0.12);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'EB Garamond', serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
    font-style: italic;
    color: rgba(60,40,20,0.25);
    text-shadow:
      -1px -1px 0 rgba(220,190,140,0.5),
      1px 1px 1px rgba(40,25,10,0.35),
      -1px -1px 2px rgba(220,190,140,0.2),
      1px 1px 3px rgba(40,25,10,0.15);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(180,150,100,0.2);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  .env-text {
    text-align: center;
    color: rgba(200,175,135,0.7);
    font-size: 13.5px; font-weight: 400;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px;
    color: rgba(200,175,135,0.4);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  .card {
    position: absolute;
    width: 396px; padding: 40px 32px;
    border-radius: 2px;
    background-color: #faf5ed;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(160,130,80,0.12);
    pointer-events: none;
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160,130,80,0.25), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 400;
    color: #3a2e1e; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(160,130,80,0.4);
    letter-spacing: 2px;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #6a5a40; font-size: 12px;
    font-weight: 400; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(120,100,65,0.2);
    letter-spacing: 4px; text-transform: uppercase;
  }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(200,175,135,0.35);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    font-family: 'EB Garamond', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(200,175,135,0.6); }

  /* 動畫 */
  .scene.phase-1 .fold-upper { opacity: 0; }
  .scene.phase-1 .env-flap-wrapper { transform: rotateX(40deg); }
  .scene.phase-2 .env-flap-wrapper { transform: rotateX(160deg); opacity: 0; }
  .scene.phase-2 .envelope-outer { transform: translateY(20px) scale(0.96); opacity: 0; }
  .scene.phase-2 .env-text,
  .scene.phase-2 .tap-hint { opacity: 0; }
  .scene.phase-3 .card { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; z-index: 10; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  @media (max-width: 480px) {
    body { background-color: #8b6e4e; }
    .scene { width: 100vw; }
    .envelope-outer { position: fixed; inset: 0; width: 100vw; height: 100dvh; filter: none; }
    .envelope { width: 100%; height: 100%; border-radius: 0; perspective: 1200px; }
    .env-body canvas { border-radius: 0; }
    .seal { width: 88px !important; height: 88px !important; }
    .scene.phase-1 .env-flap-wrapper { transform: rotateX(35deg); }
    .scene.phase-2 .env-flap-wrapper { transform: rotateX(150deg); opacity: 0; }
    .scene.phase-2 .envelope-outer { opacity: 0; }
    .env-text { position: fixed !important; bottom: 16vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; font-size: 14px; }
    .tap-hint { position: fixed !important; bottom: 12vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; }
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <div class="envelope-outer">
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <div class="wood-frame"></div>
    </div>

    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur"><feGaussianBlur stdDeviation="2.2"/></filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.05)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.20)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.40)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.52)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28"
               fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>

    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <!-- 寬柔陰影 -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.10)" stroke-width="1.5" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.08)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <!-- 銳利摺痕 -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(200,170,120,0.12)" stroke-width="0.45" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(200,170,120,0.10)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <!-- 高光線 -->
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5" stroke="rgba(220,190,140,0.14)" stroke-width="0.3"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5" stroke="rgba(220,190,140,0.11)" stroke-width="0.25"/>
      </g>
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.06)" stroke-width="0.8" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.05)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(200,170,120,0.08)" stroke-width="0.25" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(200,170,120,0.06)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" stroke="rgba(220,190,140,0.10)" stroke-width="0.2"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" stroke="rgba(220,190,140,0.08)" stroke-width="0.18"/>
      </g>
    </svg>

    <div class="env-flap-wrapper">
      <div class="env-flap">
        <canvas id="flapTex"></canvas>
      </div>
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>

<script>
// ======== 木紋紋理 ========
function makeWoodTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, w, h);

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  // Layer 1: 木紋年輪 — 水平方向的波浪明暗帶
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % w;
    const py = Math.floor((i/4) / w);

    // 用 sin 疊加不同頻率模擬年輪
    const grain1 = Math.sin(py * 0.12 + Math.sin(px * 0.008) * 6) * 8;
    const grain2 = Math.sin(py * 0.25 + Math.sin(px * 0.015) * 4) * 4;
    const grain3 = Math.sin(py * 0.6 + Math.sin(px * 0.003) * 12) * 2;
    const grain = grain1 + grain2 + grain3;

    // 基礎噪點
    const noise = (Math.random() - 0.5) * 10;
    const warm = Math.random() * 2;

    d[i] += grain + noise + warm;
    d[i+1] += grain + noise;
    d[i+2] += (grain + noise) * 0.7 - warm;
  }

  // Layer 2: 木纖維 — 水平細長線條
  for (let f = 0; f < 600; f++) {
    const fy = Math.random() * h;
    const fx = Math.random() * w;
    const len = 20 + Math.random() * 80;
    const br = (Math.random() - 0.5) * 14;
    for (let p = 0; p < len; p++) {
      const px = Math.floor(fx + p);
      const py = Math.floor(fy + Math.sin(p * 0.05) * 1.5);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const idx = (py * w + px) * 4;
        d[idx] += br; d[idx+1] += br * 0.9; d[idx+2] += br * 0.6;
      }
    }
  }

  // Layer 3: 木節 — 偶爾出現的圓形暗區
  const knots = 2 + Math.floor(Math.random() * 3);
  for (let k = 0; k < knots; k++) {
    const kx = 50 + Math.random() * (w - 100);
    const ky = 50 + Math.random() * (h - 100);
    const kR = 8 + Math.random() * 18;
    for (let dy = -kR*2; dy < kR*2; dy++) {
      for (let dx = -kR*2; dx < kR*2; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < kR * 2) {
          const px = Math.floor(kx + dx), py = Math.floor(ky + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const idx = (py * w + px) * 4;
            // 環狀紋理
            const ring = Math.sin(dist * 0.8) * 6;
            const falloff = Math.max(0, 1 - dist / (kR * 2));
            const v = (-8 + ring) * falloff * falloff;
            d[idx] += v; d[idx+1] += v * 0.9; d[idx+2] += v * 0.7;
          }
        }
      }
    }
  }

  // Layer 4: 大面積明暗 — 木材天然色差
  for (let b = 0; b < 25; b++) {
    const bx = Math.random() * w, by = Math.random() * h;
    const bR = 30 + Math.random() * 60;
    const bBr = (Math.random() - 0.5) * 10;
    for (let dy = -bR; dy < bR; dy++) {
      for (let dx = -bR; dx < bR; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bR) {
          const px = Math.floor(bx + dx), py = Math.floor(by + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const falloff = 1 - dist / bR;
            const idx = (py * w + px) * 4;
            const v = bBr * falloff * falloff;
            d[idx] += v + 0.5; d[idx+1] += v; d[idx+2] += v * 0.7;
          }
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr);
  const sh = Math.ceil(window.innerHeight * dpr);
  makeWoodTexture(document.getElementById('envTex'), sw, sh, 139, 110, 78);
  makeWoodTexture(document.getElementById('flapTex'), sw, sh, 168, 136, 104);
} else {
  makeWoodTexture(document.getElementById('envTex'), 880, 620, 139, 110, 78);
  makeWoodTexture(document.getElementById('flapTex'), 880, 620, 168, 136, 104);
}

// ======== 燒印蠟封 ========
(function makeBurnSeal() {
  const c = document.getElementById('sealTex');
  const size = 176;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // 深木色底
  const base = ctx.createRadialGradient(
    cx - r*0.3, cy - r*0.35, r*0.05,
    cx + r*0.1, cy + r*0.2, r*1.1
  );
  base.addColorStop(0,    '#b08050');
  base.addColorStop(0.25, '#9a6e42');
  base.addColorStop(0.5,  '#8a5e35');
  base.addColorStop(0.75, '#7a5030');
  base.addColorStop(1,    '#6a4228');
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();

  // 木紋紋理
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % size, py = Math.floor((i/4) / size);
    const dist = Math.sqrt((px-cx)**2 + (py-cy)**2);
    if (dist > r) continue;
    // 微年輪
    const grain = Math.sin(py * 0.3 + Math.sin(px * 0.02) * 4) * 5;
    const n = (Math.random() - 0.5) * 10;
    d[i] += grain + n + 1; d[i+1] += grain + n; d[i+2] += (grain + n) * 0.7;
  }

  // 燒焦邊緣
  for (let g = 0; g < 80; g++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = r * (0.75 + Math.random() * 0.2);
    const gx = Math.floor(cx + Math.cos(angle) * dist);
    const gy = Math.floor(cy + Math.sin(angle) * dist);
    if (gx >= 0 && gx < size && gy >= 0 && gy < size) {
      const idx = (gy * size + gx) * 4;
      d[idx] -= 12; d[idx+1] -= 14; d[idx+2] -= 10;
    }
  }
  ctx.putImageData(img, 0, 0);

  // 邊緣暗化
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(
    cx - r*0.18, cy - r*0.18, r*0.55,
    cx + r*0.05, cy + r*0.05, r
  );
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.4, 'rgba(0,0,0,0.04)');
  edge.addColorStop(0.7, 'rgba(0,0,0,0.12)');
  edge.addColorStop(0.88, 'rgba(0,0,0,0.22)');
  edge.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, size, size);

  // 凸環
  const rimOuter = ctx.createRadialGradient(cx, cy, r*0.74, cx, cy, r*0.86);
  rimOuter.addColorStop(0, 'transparent');
  rimOuter.addColorStop(0.3, 'rgba(200,170,120,0.12)');
  rimOuter.addColorStop(0.6, 'rgba(200,170,120,0.18)');
  rimOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = rimOuter;
  ctx.fillRect(0, 0, size, size);
})();

// ======== 互動 ========
const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');

function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}
function closeEnvelope() {
  scene.classList.remove('phase-3', 'phase-2', 'phase-1');
}
seal.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
btn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>
