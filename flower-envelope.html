<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flower Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    background-color: #2e2820;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .envelope-outer {
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25))
            drop-shadow(0 8px 24px rgba(0,0,0,0.15));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                opacity 0.7s ease;
  }

  .envelope {
    position: relative;
    width: 440px; height: 310px;
    border-radius: 4px;
    z-index: 2;
    perspective: 1000px;
    transform-style: preserve-3d;
  }

  .env-body {
    width: 100%; height: 100%;
    position: relative;
    background-color: #F0E6D8;
    border-radius: 4px;
    overflow: hidden;
  }
  .env-body canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .botanical-overlay {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60px 40px at 20% 25%, rgba(200,120,90,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 45px 55px at 75% 35%, rgba(190,100,80,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 50px 35px at 40% 70%, rgba(220,170,130,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 30px 40px at 85% 75%, rgba(160,150,90,0.06) 0%, transparent 55%);
    pointer-events: none; z-index: 1;
  }

  /* Inner frame border (replaces stitching) */
  .inner-frame {
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(180,160,130,0.15);
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  .flap-shadow {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow { opacity: 0; }

  .fold-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .env-flap-wrapper {
    position: absolute;
    inset: 0;
    transform-origin: center top;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute;
    inset: 0;
    background-color: #E0D4C4;
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .env-flap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg,
        rgba(255,245,220,0.10) 0%,
        rgba(255,245,220,0.03) 40%,
        rgba(0,0,0,0.06) 70%,
        rgba(0,0,0,0.10) 100%),
      linear-gradient(to bottom,
        rgba(255,245,220,0.04) 0%,
        rgba(0,0,0,0.03) 38%,
        rgba(0,0,0,0.08) 42%);
    pointer-events: none; z-index: 1;
    transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      linear-gradient(135deg,
        rgba(255,245,220,0.06) 0%,
        rgba(0,0,0,0.08) 30%,
        rgba(0,0,0,0.18) 70%,
        rgba(0,0,0,0.28) 100%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.04) 0%,
        rgba(0,0,0,0.14) 30%,
        rgba(0,0,0,0.24) 42%);
  }

  /* ======== Botanical pressed flower seal ======== */
  .seal {
    position: absolute;
    top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  .seal::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.2),
      1px 2px 4px rgba(0,0,0,0.18),
      2px 4px 8px rgba(0,0,0,0.14),
      3px 6px 16px rgba(0,0,0,0.10);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal { opacity: 0; transition: opacity 0.5s ease; }

  .seal-disc {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative; overflow: hidden;
  }
  .seal-disc canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
  }
  .seal-disc::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,245,220,0.25) 0%, transparent 45%),
      radial-gradient(ellipse at 70% 75%, rgba(0,0,0,0.06) 0%, transparent 40%);
    pointer-events: none; z-index: 2;
  }
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow:
      inset 5px 5px 6px -2px rgba(0,0,0,0.20),
      inset 3px 3px 4px -1px rgba(0,0,0,0.12);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip {
    position: absolute; inset: 18%; border-radius: 50%;
    pointer-events: none; z-index: 3;
  }
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(180,150,110,0.3);
    pointer-events: none; z-index: 4;
  }
  .seal-ring::before {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(140,110,80,0.15);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
    font-style: italic;
    color: rgba(160,130,100,0.3);
    text-shadow:
      -1px -1px 0 rgba(240,220,180,0.5),
      1px 1px 1px rgba(80,55,30,0.3),
      -1px -1px 2px rgba(240,220,180,0.2),
      1px 1px 3px rgba(80,55,30,0.15);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(180,155,120,0.25);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  .env-text {
    text-align: center;
    color: rgba(220,200,170,0.75);
    font-size: 13.5px; font-weight: 400;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px;
    color: rgba(220,200,170,0.45);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  .card {
    position: absolute;
    width: 396px; padding: 40px 32px;
    border-radius: 2px;
    background-color: #faf8f4;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(180,150,100,0.15);
    pointer-events: none;
  }
  .card-border::before {
    content: ''; position: absolute; inset: 4px;
    border: 0.5px solid rgba(180,150,100,0.08);
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,150,100,0.3), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 400;
    color: #3a2a1e; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(180,150,100,0.45);
    letter-spacing: 2px; font-weight: 400;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #6a5545; font-size: 12px;
    font-weight: 400; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(140,110,80,0.25);
    letter-spacing: 4px; text-transform: uppercase;
  }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(220,200,170,0.35);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    font-family: 'Playfair Display', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(220,200,170,0.6); }

  /* Animation Phases */
  .scene.phase-1 .fold-upper { opacity: 0; }
  .scene.phase-1 .env-flap-wrapper { transform: rotateX(40deg); }

  .scene.phase-2 .env-flap-wrapper { transform: rotateX(160deg); opacity: 0; }
  .scene.phase-2 .envelope-outer { transform: translateY(20px) scale(0.96); opacity: 0; }
  .scene.phase-2 .env-text,
  .scene.phase-2 .tap-hint { opacity: 0; }

  .scene.phase-3 .card { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; z-index: 10; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  /* Mobile */
  @media (max-width: 480px) {
    body { background-color: #F0E6D8; }
    .scene { width: 100vw; }
    .envelope-outer { position: fixed; inset: 0; width: 100vw; height: 100dvh; filter: none; }
    .envelope { width: 100%; height: 100%; border-radius: 0; perspective: 1200px; }
    .env-body canvas { border-radius: 0; }
    .inner-frame { inset: 12px; }
    .seal { width: 88px !important; height: 88px !important; }
    .scene.phase-1 .env-flap-wrapper { transform: rotateX(35deg); }
    .scene.phase-2 .env-flap-wrapper { transform: rotateX(150deg); opacity: 0; }
    .scene.phase-2 .envelope-outer { opacity: 0; }
    .env-text { position: fixed !important; bottom: 16vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; font-size: 14px; }
    .tap-hint { position: fixed !important; bottom: 12vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; }
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <div class="envelope-outer">
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <div class="botanical-overlay"></div>
      <div class="inner-frame"></div>
    </div>

    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur"><feGaussianBlur stdDeviation="2.2"/></filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.04)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.16)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.30)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.40)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28"
               fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>

    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <!-- Wide soft shadow -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(0,0,0,0.07)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <!-- Fold crease -->
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(180,160,130,0.08)" stroke-width="0.45" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(180,160,130,0.07)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <!-- Highlight -->
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5" stroke="rgba(200,180,150,0.10)" stroke-width="0.3"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5" stroke="rgba(200,180,150,0.08)" stroke-width="0.25"/>
      </g>
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.06)" stroke-width="0.8" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(0,0,0,0.05)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(180,160,130,0.06)" stroke-width="0.25" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(180,160,130,0.05)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" stroke="rgba(200,180,150,0.08)" stroke-width="0.2"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" stroke="rgba(200,180,150,0.06)" stroke-width="0.18"/>
      </g>
    </svg>

    <div class="env-flap-wrapper">
      <div class="env-flap">
        <canvas id="flapTex"></canvas>
      </div>
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>

<script>
// ======== Pressed Flower Parchment Texture ========
function makeFlowerTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Base: Aged cream with slight yellow tint gradient
  const bg = ctx.createLinearGradient(0, 0, w * 0.4, h);
  bg.addColorStop(0, `rgb(${baseR+5},${baseG+4},${baseB+3})`);
  bg.addColorStop(0.5, `rgb(${baseR},${baseG},${baseB})`);
  bg.addColorStop(1, `rgb(${baseR-3},${baseG-2},${baseB-4})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Layer 5 (early): Very subtle base noise across entire surface
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 10;
    const warm = Math.random() * 2;
    d[i] += n + warm;
    d[i+1] += n + warm * 0.5;
    d[i+2] += n - warm * 0.3;
  }
  ctx.putImageData(img, 0, 0);

  // Layer 1: 20-30 circular "age spots" (2x brightness)
  const spotCount = 20 + Math.floor(Math.random() * 11);
  for (let s = 0; s < spotCount; s++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const sr = 15 + Math.random() * 45;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    const opacity = (0.04 + Math.random() * 0.06) * 2;
    grad.addColorStop(0, `rgba(160,130,90,${opacity})`);
    grad.addColorStop(0.5, `rgba(150,125,85,${opacity * 0.5})`);
    grad.addColorStop(1, `rgba(${baseR},${baseG},${baseB},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Layer 2: 100-150 fiber lines (thicker, more visible)
  const fiberCount = 100 + Math.floor(Math.random() * 51);
  for (let f = 0; f < fiberCount; f++) {
    const fx = Math.random() * w;
    const fy = Math.random() * h;
    const len = 20 + Math.random() * 80;
    const angle = (Math.random() - 0.5) * 0.6;
    const isWarm = f % 2 === 0;
    const alpha = 0.05 + Math.random() * 0.06;
    ctx.strokeStyle = isWarm
      ? `rgba(170,145,110,${alpha})`
      : `rgba(140,150,145,${alpha})`;
    ctx.lineWidth = 0.5 + Math.random() * 0.8;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    const cp1x = fx + len * 0.33 + (Math.random() - 0.5) * 12;
    const cp1y = fy + Math.sin(angle) * len * 0.33 + (Math.random() - 0.5) * 8;
    const cp2x = fx + len * 0.66 + (Math.random() - 0.5) * 12;
    const cp2y = fy + Math.sin(angle) * len * 0.66 + (Math.random() - 0.5) * 8;
    const ex = fx + len;
    const ey = fy + Math.sin(angle) * len;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ex, ey);
    ctx.stroke();
  }

  // Layer 3: 12-18 "flower petal" shapes (larger, more opaque, saturated)
  const petalColors = [
    [200, 120, 90],
    [190, 100, 80],
    [220, 170, 130],
    [200, 120, 90],
    [190, 100, 80]
  ];
  const petalCount = 12 + Math.floor(Math.random() * 7);
  for (let p = 0; p < petalCount; p++) {
    const px = 40 + Math.random() * (w - 80);
    const py = 40 + Math.random() * (h - 80);
    const prx = 30 + Math.random() * 50;
    const pry = 25 + Math.random() * 40;
    const pAngle = Math.random() * Math.PI;
    const col = petalColors[Math.floor(Math.random() * petalColors.length)];

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(pAngle);

    // Petal body with radial gradient (3x opacity)
    const petalGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(prx, pry));
    petalGrad.addColorStop(0, `rgba(${col[0]+20},${col[1]+15},${col[2]+10},0.36)`);
    petalGrad.addColorStop(0.6, `rgba(${col[0]},${col[1]},${col[2]},0.30)`);
    petalGrad.addColorStop(1, `rgba(${col[0]-15},${col[1]-15},${col[2]-10},0.12)`);
    ctx.fillStyle = petalGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, prx, pry, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2-3 vein lines within each petal
    const veinCount = 2 + Math.floor(Math.random() * 2);
    for (let v = 0; v < veinCount; v++) {
      const vy = (v - veinCount / 2) * (pry * 0.4);
      ctx.strokeStyle = `rgba(${col[0]-20},${col[1]-20},${col[2]-15},0.18)`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-prx * 0.7, vy);
      ctx.quadraticCurveTo(0, vy + (Math.random() - 0.5) * 4, prx * 0.7, vy);
      ctx.stroke();
    }

    ctx.restore();
  }

  // Layer 4: 5-8 leaf shapes (larger, 2.5x opacity, visible green-gold)
  const leafColors = [
    [160, 150, 90],
    [140, 125, 80],
    [160, 150, 90],
    [140, 125, 80]
  ];
  const leafCount = 5 + Math.floor(Math.random() * 4);
  for (let l = 0; l < leafCount; l++) {
    const lx = 30 + Math.random() * (w - 60);
    const ly = 30 + Math.random() * (h - 60);
    const lrx = 20 + Math.random() * 35;
    const lry = 12 + Math.random() * 20;
    const lAngle = Math.random() * Math.PI;
    const lcol = leafColors[Math.floor(Math.random() * leafColors.length)];

    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(lAngle);

    const leafGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(lrx, lry));
    leafGrad.addColorStop(0, `rgba(${lcol[0]+10},${lcol[1]+8},${lcol[2]+5},0.25)`);
    leafGrad.addColorStop(0.7, `rgba(${lcol[0]},${lcol[1]},${lcol[2]},0.20)`);
    leafGrad.addColorStop(1, `rgba(${lcol[0]-10},${lcol[1]-10},${lcol[2]-8},0.075)`);
    ctx.fillStyle = leafGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, lrx, lry, 0, 0, Math.PI * 2);
    ctx.fill();

    // Center vein
    ctx.strokeStyle = `rgba(${lcol[0]-15},${lcol[1]-12},${lcol[2]-10},0.15)`;
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(-lrx * 0.8, 0);
    ctx.lineTo(lrx * 0.8, 0);
    ctx.stroke();

    ctx.restore();
  }
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr);
  const sh = Math.ceil(window.innerHeight * dpr);
  makeFlowerTexture(document.getElementById('envTex'), sw, sh, 240, 230, 216);
  makeFlowerTexture(document.getElementById('flapTex'), sw, sh, 224, 212, 196);
} else {
  makeFlowerTexture(document.getElementById('envTex'), 880, 620, 240, 230, 216);
  makeFlowerTexture(document.getElementById('flapTex'), 880, 620, 224, 212, 196);
}

// ======== Botanical Pressed Flower Seal ========
(function makeBotanicalSeal() {
  const c = document.getElementById('sealTex');
  const size = 176;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // Base: warm cream radial gradient
  const base = ctx.createRadialGradient(
    cx - r*0.25, cy - r*0.3, r*0.05,
    cx + r*0.1, cy + r*0.15, r*1.1
  );
  base.addColorStop(0,    '#f5edd8');
  base.addColorStop(0.25, '#ece2cc');
  base.addColorStop(0.5,  '#e2d6be');
  base.addColorStop(0.75, '#d8cab0');
  base.addColorStop(1,    '#c8b898');
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();

  // Cream texture noise
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % size, py = Math.floor((i/4) / size);
    const dist = Math.sqrt((px-cx)**2 + (py-cy)**2);
    if (dist > r) continue;
    const n = (Math.random() - 0.5) * 8;
    const warm = (Math.random() - 0.5) * 3;
    d[i] += n + warm; d[i+1] += n + warm * 0.5; d[i+2] += n - warm * 0.5;
  }
  ctx.putImageData(img, 0, 0);

  // Pressed flower motif — small petals at center
  const motifPetals = [
    { angle: 0, rx: 14, ry: 8, col: [200, 140, 120] },
    { angle: Math.PI * 0.4, rx: 12, ry: 7, col: [212, 149, 106] },
    { angle: Math.PI * 0.8, rx: 13, ry: 7, col: [195, 135, 115] },
    { angle: Math.PI * 1.2, rx: 11, ry: 8, col: [232, 206, 170] },
    { angle: Math.PI * 1.6, rx: 13, ry: 7, col: [200, 140, 120] }
  ];
  for (const mp of motifPetals) {
    const mpx = cx + Math.cos(mp.angle) * 16;
    const mpy = cy + Math.sin(mp.angle) * 16;
    ctx.save();
    ctx.translate(mpx, mpy);
    ctx.rotate(mp.angle + Math.PI * 0.5);
    const pg = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(mp.rx, mp.ry));
    pg.addColorStop(0, `rgba(${mp.col[0]+15},${mp.col[1]+10},${mp.col[2]+8},0.22)`);
    pg.addColorStop(0.6, `rgba(${mp.col[0]},${mp.col[1]},${mp.col[2]},0.18)`);
    pg.addColorStop(1, `rgba(${mp.col[0]-10},${mp.col[1]-10},${mp.col[2]-8},0.06)`);
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.ellipse(0, 0, mp.rx, mp.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    // Vein
    ctx.strokeStyle = `rgba(${mp.col[0]-20},${mp.col[1]-20},${mp.col[2]-15},0.10)`;
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-mp.rx * 0.6, 0);
    ctx.lineTo(mp.rx * 0.6, 0);
    ctx.stroke();
    ctx.restore();
  }

  // Small leaves
  const leafAngles = [Math.PI * 0.2, Math.PI * 1.0, Math.PI * 1.5];
  for (const la of leafAngles) {
    const llx = cx + Math.cos(la) * 24;
    const lly = cy + Math.sin(la) * 24;
    ctx.save();
    ctx.translate(llx, lly);
    ctx.rotate(la);
    const lg = ctx.createRadialGradient(0, 0, 0, 0, 0, 10);
    lg.addColorStop(0, 'rgba(184,168,120,0.18)');
    lg.addColorStop(0.7, 'rgba(160,137,109,0.12)');
    lg.addColorStop(1, 'rgba(150,130,100,0.04)');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Gold accent center dot
  const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 6);
  centerGrad.addColorStop(0, 'rgba(210,185,130,0.20)');
  centerGrad.addColorStop(1, 'rgba(200,175,120,0.05)');
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fill();

  // Edge darkening
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(
    cx - r*0.15, cy - r*0.15, r*0.55,
    cx + r*0.05, cy + r*0.05, r
  );
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.4, 'rgba(0,0,0,0.02)');
  edge.addColorStop(0.7, 'rgba(0,0,0,0.08)');
  edge.addColorStop(0.88, 'rgba(0,0,0,0.16)');
  edge.addColorStop(1, 'rgba(0,0,0,0.26)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, size, size);

  // Subtle rim
  const rimOuter = ctx.createRadialGradient(cx, cy, r*0.74, cx, cy, r*0.86);
  rimOuter.addColorStop(0, 'transparent');
  rimOuter.addColorStop(0.2, 'rgba(240,225,190,0.10)');
  rimOuter.addColorStop(0.5, 'rgba(240,225,190,0.18)');
  rimOuter.addColorStop(0.8, 'rgba(240,225,190,0.08)');
  rimOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = rimOuter;
  ctx.fillRect(0, 0, size, size);
})();

// ======== Interaction ========
const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');

function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}
function closeEnvelope() {
  scene.classList.remove('phase-3', 'phase-2', 'phase-1');
}
seal.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
btn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>
