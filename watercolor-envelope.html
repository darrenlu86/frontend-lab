<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Watercolor Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    background-color: #2e2824;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .envelope-outer {
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25))
            drop-shadow(0 8px 24px rgba(0,0,0,0.15));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1), opacity 0.7s ease;
  }

  .envelope {
    position: relative; width: 440px; height: 310px;
    border-radius: 4px; z-index: 2;
    perspective: 1000px; transform-style: preserve-3d;
  }

  .env-body {
    width: 100%; height: 100%; position: relative;
    background-color: #F5E6D3; border-radius: 4px; overflow: hidden;
  }
  .env-body canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .watercolor-wash {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 200px 120px at 20% 30%, rgba(220,160,120,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 160px 140px at 70% 40%, rgba(200,130,100,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 180px 100px at 45% 75%, rgba(225,175,145,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 140px 90px at 85% 20%, rgba(230,190,140,0.08) 0%, transparent 55%);
    pointer-events: none; z-index: 1;
  }

  .watercolor-border {
    position: absolute; inset: 10px;
    border: 1px solid rgba(200,170,140,0.15);
    border-radius: 3px; pointer-events: none; z-index: 2;
  }

  .flap-shadow {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow { opacity: 0; }

  .fold-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; transition: opacity 0.5s ease;
  }

  .env-flap-wrapper {
    position: absolute; inset: 0;
    transform-origin: center top; transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute; inset: 0;
    background-color: #E4D2BC;
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .env-flap::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(135deg, rgba(255,235,210,0.12) 0%, transparent 40%, rgba(0,0,0,0.05) 70%, rgba(0,0,0,0.10) 100%),
      linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.02) 38%, rgba(0,0,0,0.06) 42%);
    pointer-events: none; z-index: 1; transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      linear-gradient(135deg, rgba(255,235,210,0.06) 0%, rgba(0,0,0,0.08) 30%, rgba(0,0,0,0.20) 70%, rgba(0,0,0,0.30) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.16) 30%, rgba(0,0,0,0.26) 42%);
  }

  .seal {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px; cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  .seal::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25), 1px 2px 4px rgba(0,0,0,0.2), 2px 4px 8px rgba(0,0,0,0.15), 3px 6px 16px rgba(0,0,0,0.1);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal { opacity: 0; transition: opacity 0.5s ease; }

  .seal-disc { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; }
  .seal-disc canvas { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; }
  .seal-disc::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,240,220,0.28) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 75%, rgba(0,0,0,0.06) 0%, transparent 40%);
    pointer-events: none; z-index: 2;
  }
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow: inset 5px 5px 6px -2px rgba(0,0,0,0.25), inset 3px 3px 4px -1px rgba(0,0,0,0.15);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip { position: absolute; inset: 18%; border-radius: 50%; pointer-events: none; z-index: 3; }
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(200,170,140,0.3); pointer-events: none; z-index: 4;
  }
  .seal-ring::before {
    content: ''; position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(180,150,120,0.15);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px; font-style: italic;
    color: rgba(180,150,120,0.3);
    text-shadow: -1px -1px 0 rgba(255,240,220,0.5), 1px 1px 1px rgba(100,70,40,0.35);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(200,170,140,0.25);
    animation: pulse 2.5s ease-in-out infinite; pointer-events: none;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.12); opacity: 0; } }

  .env-text {
    text-align: center; color: rgba(240,230,216,0.75);
    font-size: 13.5px; font-weight: 400; letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px; color: rgba(240,230,216,0.45);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite; transition: opacity 0.5s ease;
  }
  @keyframes fadeHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

  .card {
    position: absolute; width: 396px; padding: 40px 32px; border-radius: 2px;
    background-color: #faf8f4;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border { position: absolute; inset: 12px; border: 1px solid rgba(200,170,140,0.15); pointer-events: none; }
  .card-border::before { content: ''; position: absolute; inset: 4px; border: 0.5px solid rgba(200,170,140,0.08); }
  .card-ornament { width: 44px; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,170,140,0.3), transparent); margin-bottom: 22px; }
  .card-names { font-size: 25px; font-weight: 400; color: #3a302a; text-align: center; line-height: 1.8; letter-spacing: 4px; }
  .card-and { font-style: italic; font-size: 15px; color: rgba(200,170,140,0.45); letter-spacing: 2px; font-weight: 400; }
  .card-details { margin-top: 22px; text-align: center; color: #6a5a4a; font-size: 12px; font-weight: 400; letter-spacing: 2px; line-height: 2.2; }
  .card-footer { font-size: 9px; margin-top: 24px; color: rgba(160,140,115,0.25); letter-spacing: 4px; text-transform: uppercase; }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none; color: rgba(240,230,216,0.35);
    font-size: 12px; letter-spacing: 3px; cursor: pointer;
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    font-family: 'Playfair Display', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(240,230,216,0.6); }

  .scene.phase-1 .fold-upper { opacity: 0; }
  .scene.phase-1 .env-flap-wrapper { transform: rotateX(40deg); }
  .scene.phase-2 .env-flap-wrapper { transform: rotateX(160deg); opacity: 0; }
  .scene.phase-2 .envelope-outer { transform: translateY(20px) scale(0.96); opacity: 0; }
  .scene.phase-2 .env-text, .scene.phase-2 .tap-hint { opacity: 0; }
  .scene.phase-3 .card { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; z-index: 10; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  @media (max-width: 480px) {
    body { background-color: #F5E6D3; background-image: none; }
    .scene { width: 100vw; }
    .envelope-outer { position: fixed; inset: 0; width: 100vw; height: 100dvh; filter: none; }
    .envelope { width: 100%; height: 100%; border-radius: 0; perspective: 1200px; }
    .watercolor-border { inset: 12px; }
    .seal { width: 88px !important; height: 88px !important; }
    .scene.phase-1 .env-flap-wrapper { transform: rotateX(35deg); }
    .scene.phase-2 .env-flap-wrapper { transform: rotateX(150deg); opacity: 0; }
    .scene.phase-2 .envelope-outer { opacity: 0; }
    .env-text { position: fixed !important; bottom: 16vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; font-size: 14px; }
    .tap-hint { position: fixed !important; bottom: 12vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; }
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>
<button class="close-btn" id="closeBtn">CLOSE</button>
<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">YU CHEN<div class="card-and">&amp;</div>WEI TING</div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div><div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div><div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>
  <div class="envelope-outer">
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <div class="watercolor-wash"></div>
      <div class="watercolor-border"></div>
    </div>
    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur"><feGaussianBlur stdDeviation="2.2"/></filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.03)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.12)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.24)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28" fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>
    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(180,155,125,0.06)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(180,155,125,0.05)" stroke-width="1.0" filter="url(#foldShadow)"/>
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(200,180,150,0.06)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(200,180,150,0.05)" stroke-width="0.35" filter="url(#foldBlur)"/>
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5" stroke="rgba(210,190,160,0.08)" stroke-width="0.25"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5" stroke="rgba(210,190,160,0.06)" stroke-width="0.2"/>
      </g>
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(180,155,125,0.04)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(180,155,125,0.03)" stroke-width="0.6" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(200,180,150,0.04)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(200,180,150,0.03)" stroke-width="0.18" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" stroke="rgba(210,190,160,0.06)" stroke-width="0.18"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" stroke="rgba(210,190,160,0.05)" stroke-width="0.15"/>
      </g>
    </svg>
    <div class="env-flap-wrapper">
      <div class="env-flap"><canvas id="flapTex"></canvas></div>
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div>
  </div>
  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>
<script>
function makeWatercolorTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Soft cream base
  const bg = ctx.createLinearGradient(0, 0, w*0.3, h);
  bg.addColorStop(0, `rgb(${baseR+3},${baseG+2},${baseB+2})`);
  bg.addColorStop(1, `rgb(${baseR-2},${baseG-3},${baseB-2})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Watercolor pools — large feathered circles
  const poolColors = [
    [220,160,120], [200,130,100], [230,190,140], [215,150,130],
    [225,175,145], [210,140,110]
  ];
  for (let p = 0; p < 14; p++) {
    const px = Math.random() * w, py = Math.random() * h;
    const pr = 50 + Math.random() * 130;
    const col = poolColors[Math.floor(Math.random() * poolColors.length)];
    const poolAlpha = 0.15 + Math.random() * 0.20;

    // Multiple concentric circles for feathered edges
    for (let ring = 0; ring < 3; ring++) {
      const ringR = pr * (1 - ring * 0.15);
      const ringAlpha = poolAlpha * (1 - ring * 0.18);
      ctx.globalAlpha = ringAlpha;
      const grad = ctx.createRadialGradient(px, py, 0, px, py, ringR);
      grad.addColorStop(0, `rgb(${col[0]},${col[1]},${col[2]})`);
      grad.addColorStop(0.6, `rgba(${col[0]},${col[1]},${col[2]},0.6)`);
      grad.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(px - ringR, py - ringR, ringR * 2, ringR * 2);
    }
  }
  ctx.globalAlpha = 1;

  // Bleed effects — extended soft gradients
  for (let b = 0; b < 6; b++) {
    const bx = Math.random() * w, by = Math.random() * h;
    const bw = 20 + Math.random() * 40, bh = 60 + Math.random() * 120;
    const col = poolColors[Math.floor(Math.random() * poolColors.length)];
    ctx.globalAlpha = 0.08 + Math.random() * 0.10;
    const grad = ctx.createLinearGradient(bx, by, bx + (Math.random()-0.5)*20, by + bh);
    grad.addColorStop(0, `rgb(${col[0]},${col[1]},${col[2]})`);
    grad.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(bx - bw/2, by, bw, bh);
  }
  ctx.globalAlpha = 1;

  // Very subtle paper texture noise
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 5;
    d[i] += n + Math.random() * 1.5;
    d[i+1] += n;
    d[i+2] += n - Math.random() * 0.5;
  }

  // Warm tint overlay
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4) % w, py = Math.floor((i/4) / w);
    const warmth = (1 - py/h) * 3;
    d[i] += warmth + 1; d[i+1] += warmth * 0.6; d[i+2] += warmth * 0.3;
  }

  ctx.putImageData(img, 0, 0);
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);
if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr), sh = Math.ceil(window.innerHeight * dpr);
  makeWatercolorTexture(document.getElementById('envTex'), sw, sh, 245, 230, 211);
  makeWatercolorTexture(document.getElementById('flapTex'), sw, sh, 228, 210, 188);
} else {
  makeWatercolorTexture(document.getElementById('envTex'), 880, 620, 245, 230, 211);
  makeWatercolorTexture(document.getElementById('flapTex'), 880, 620, 228, 210, 188);
}

// ======== Watercolor bloom seal ========
(function() {
  const c = document.getElementById('sealTex');
  const size = 176; c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;

  // Soft peachy base
  const base = ctx.createRadialGradient(cx-r*0.2,cy-r*0.25,r*0.05, cx+r*0.1,cy+r*0.15,r*1.1);
  base.addColorStop(0,'#f5ece0'); base.addColorStop(0.3,'#f0d4c4');
  base.addColorStop(0.6,'#e4c0a8'); base.addColorStop(1,'#d9b8a0');
  ctx.fillStyle = base; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

  // Watercolor bloom rings
  const bloomColors = [[240,210,190],[230,180,160],[232,196,160],[220,200,180],[235,195,170]];
  for (let ring = 0; ring < 5; ring++) {
    const ringR = r * (0.3 + ring * 0.12);
    const col = bloomColors[ring];
    ctx.globalAlpha = 0.12 - ring * 0.015;
    const grad = ctx.createRadialGradient(cx, cy, ringR * 0.7, cx, cy, ringR);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.4, `rgb(${col[0]},${col[1]},${col[2]})`);
    grad.addColorStop(0.7, `rgba(${col[0]},${col[1]},${col[2]},0.5)`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,ringR,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Paper stipple
  const img = ctx.getImageData(0,0,size,size); const d = img.data;
  for (let i = 0; i < 70; i++) {
    const angle = Math.random()*Math.PI*2;
    const dist = Math.random()*r*0.85;
    const px = Math.floor(cx+Math.cos(angle)*dist);
    const py = Math.floor(cy+Math.sin(angle)*dist);
    if (px>=0&&px<size&&py>=0&&py<size) {
      const idx=(py*size+px)*4;
      const v = (Math.random()-0.5)*12;
      d[idx]+=v; d[idx+1]+=v*0.8; d[idx+2]+=v*0.6;
    }
  }
  // General noise
  for (let i = 0; i < d.length; i+=4) {
    const px=(i/4)%size, py=Math.floor((i/4)/size);
    if (Math.sqrt((px-cx)**2+(py-cy)**2) > r) continue;
    const n = (Math.random()-0.5)*6;
    d[i]+=n+0.5; d[i+1]+=n; d[i+2]+=n-0.3;
  }
  ctx.putImageData(img, 0, 0);

  // Edge darkening
  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(cx-r*0.15,cy-r*0.15,r*0.5, cx+r*0.05,cy+r*0.05,r);
  edge.addColorStop(0,'transparent'); edge.addColorStop(0.5,'rgba(0,0,0,0.03)');
  edge.addColorStop(0.75,'rgba(0,0,0,0.10)'); edge.addColorStop(0.9,'rgba(0,0,0,0.18)');
  edge.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle = edge; ctx.fillRect(0,0,size,size);

  const rim = ctx.createRadialGradient(cx,cy,r*0.74, cx,cy,r*0.86);
  rim.addColorStop(0,'transparent'); rim.addColorStop(0.3,'rgba(200,170,140,0.12)');
  rim.addColorStop(0.6,'rgba(200,170,140,0.18)'); rim.addColorStop(1,'transparent');
  ctx.fillStyle = rim; ctx.fillRect(0,0,size,size);
})();

const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');
function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}
function closeEnvelope() { scene.classList.remove('phase-3','phase-2','phase-1'); }
seal.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
btn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>
</body>
</html>
