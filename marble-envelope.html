<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marble Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    background-color: #2a2420;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .envelope-outer {
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25))
            drop-shadow(0 8px 24px rgba(0,0,0,0.15));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                opacity 0.7s ease;
  }

  .envelope {
    position: relative;
    width: 440px; height: 310px;
    border-radius: 4px;
    z-index: 2;
    perspective: 1000px;
    transform-style: preserve-3d;
  }

  .env-body {
    width: 100%; height: 100%;
    position: relative;
    background-color: #E8D7C3;
    border-radius: 4px;
    overflow: hidden;
  }
  .env-body canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .marble-veins {
    position: absolute; inset: 0;
    background:
      linear-gradient(32deg, transparent 40%, rgba(212,180,130,0.08) 42%, transparent 44%),
      linear-gradient(155deg, transparent 30%, rgba(212,180,130,0.06) 32%, transparent 34%),
      linear-gradient(75deg, transparent 55%, rgba(212,180,130,0.07) 57%, transparent 59%),
      linear-gradient(120deg, transparent 65%, rgba(200,165,120,0.05) 67%, transparent 69%);
    pointer-events: none; z-index: 1;
  }

  .gold-border {
    position: absolute; inset: 8px;
    border: 1px solid rgba(212,175,133,0.2);
    border-radius: 3px;
    pointer-events: none; z-index: 2;
  }

  .flap-shadow {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .scene.phase-2 .flap-shadow { opacity: 0; }

  .fold-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .env-flap-wrapper {
    position: absolute; inset: 0;
    transform-origin: center top;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.8s ease 0.6s;
  }
  .env-flap {
    position: absolute; inset: 0;
    background-color: #D4C2AC;
    clip-path: polygon(0% 0%, 100% 0%, 100% 28%, 50% 42%, 0% 28%);
    overflow: hidden;
  }
  .env-flap canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .env-flap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, rgba(255,240,210,0.14) 0%, transparent 40%, rgba(0,0,0,0.06) 70%, rgba(0,0,0,0.12) 100%),
      linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.03) 38%, rgba(0,0,0,0.07) 42%);
    pointer-events: none; z-index: 1;
    transition: background 0.8s ease;
  }
  .scene.phase-1 .env-flap::before {
    background:
      linear-gradient(135deg, rgba(255,240,210,0.08) 0%, rgba(0,0,0,0.10) 30%, rgba(0,0,0,0.22) 70%, rgba(0,0,0,0.32) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.18) 30%, rgba(0,0,0,0.28) 42%);
  }

  .seal {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    cursor: pointer;
    transition: opacity 0.8s ease 0.5s;
  }
  .seal::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3), 1px 2px 4px rgba(0,0,0,0.25), 2px 4px 8px rgba(0,0,0,0.2), 3px 6px 16px rgba(0,0,0,0.15);
    pointer-events: none;
  }
  .scene.phase-1 .seal-pulse { animation: none; opacity: 0; }
  .scene.phase-2 .seal { opacity: 0; transition: opacity 0.5s ease; }

  .seal-disc { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; }
  .seal-disc canvas { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; }
  .seal-disc::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,240,200,0.30) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 75%, rgba(0,0,0,0.08) 0%, transparent 40%);
    pointer-events: none; z-index: 2;
  }
  .seal-shadow {
    position: absolute; inset: 9px; border-radius: 50%;
    box-shadow: inset 5px 5px 6px -2px rgba(0,0,0,0.30), inset 3px 3px 4px -1px rgba(0,0,0,0.18);
    pointer-events: none; z-index: 3;
  }
  .seal-center-dip { position: absolute; inset: 18%; border-radius: 50%; pointer-events: none; z-index: 3; }
  .seal-ring {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 0.5px solid rgba(212,175,133,0.35);
    pointer-events: none; z-index: 4;
  }
  .seal-ring::before {
    content: ''; position: absolute; inset: 4px; border-radius: 50%;
    border: 0.5px solid rgba(160,130,90,0.15);
  }
  .seal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px; font-style: italic;
    color: rgba(160,130,90,0.3);
    text-shadow: -1px -1px 0 rgba(255,240,200,0.6), 1px 1px 1px rgba(80,60,20,0.4);
    z-index: 5;
  }
  .seal-pulse {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(212,175,133,0.25);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.12); opacity: 0; } }

  .env-text {
    text-align: center; color: rgba(232,215,195,0.75);
    font-size: 13.5px; font-weight: 400; letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .tap-hint {
    text-align: center; font-size: 10.5px; color: rgba(232,215,195,0.45);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

  .card {
    position: absolute; width: 396px; padding: 40px 32px; border-radius: 2px;
    background-color: #faf8f4;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 0; pointer-events: none;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .card-border { position: absolute; inset: 12px; border: 1px solid rgba(212,175,133,0.15); pointer-events: none; }
  .card-border::before { content: ''; position: absolute; inset: 4px; border: 0.5px solid rgba(212,175,133,0.08); }
  .card-ornament { width: 44px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,133,0.3), transparent); margin-bottom: 22px; }
  .card-names { font-size: 25px; font-weight: 400; color: #3a2e28; text-align: center; line-height: 1.8; letter-spacing: 4px; }
  .card-and { font-style: italic; font-size: 15px; color: rgba(212,175,133,0.45); letter-spacing: 2px; font-weight: 400; }
  .card-details { margin-top: 22px; text-align: center; color: #6a5a4a; font-size: 12px; font-weight: 400; letter-spacing: 2px; line-height: 2.2; }
  .card-footer { font-size: 9px; margin-top: 24px; color: rgba(160,140,110,0.25); letter-spacing: 4px; text-transform: uppercase; }

  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none; color: rgba(232,215,195,0.35);
    font-size: 12px; letter-spacing: 3px; cursor: pointer;
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    font-family: 'Playfair Display', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(232,215,195,0.6); }

  .scene.phase-1 .fold-upper { opacity: 0; }
  .scene.phase-1 .env-flap-wrapper { transform: rotateX(40deg); }
  .scene.phase-2 .env-flap-wrapper { transform: rotateX(160deg); opacity: 0; }
  .scene.phase-2 .envelope-outer { transform: translateY(20px) scale(0.96); opacity: 0; }
  .scene.phase-2 .env-text, .scene.phase-2 .tap-hint { opacity: 0; }
  .scene.phase-3 .card { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; z-index: 10; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  @media (max-width: 480px) {
    body { background-color: #E8D7C3; background-image: none; }
    .scene { width: 100vw; }
    .envelope-outer { position: fixed; inset: 0; width: 100vw; height: 100dvh; filter: none; }
    .envelope { width: 100%; height: 100%; border-radius: 0; perspective: 1200px; }
    .gold-border { inset: 12px; }
    .seal { width: 88px !important; height: 88px !important; }
    .scene.phase-1 .env-flap-wrapper { transform: rotateX(35deg); }
    .scene.phase-2 .env-flap-wrapper { transform: rotateX(150deg); opacity: 0; }
    .scene.phase-2 .envelope-outer { opacity: 0; }
    .env-text { position: fixed !important; bottom: 16vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; font-size: 14px; }
    .tap-hint { position: fixed !important; bottom: 12vh; left: 0; right: 0; margin-top: 0 !important; z-index: 6; }
    .card { width: 88vw; max-width: 360px; }
  }
</style>
</head>
<body>
<button class="close-btn" id="closeBtn">CLOSE</button>
<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">YU CHEN<div class="card-and">&amp;</div>WEI TING</div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div><div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div><div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>
  <div class="envelope-outer">
  <div class="envelope">
    <div class="env-body">
      <canvas id="envTex"></canvas>
      <div class="marble-veins"></div>
      <div class="gold-border"></div>
    </div>
    <svg class="flap-shadow" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="flapShadowBlur"><feGaussianBlur stdDeviation="2.2"/></filter>
        <linearGradient id="flapShadowGrad" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
          <stop offset="25%" stop-color="rgba(0,0,0,0.04)"/>
          <stop offset="50%" stop-color="rgba(0,0,0,0.14)"/>
          <stop offset="75%" stop-color="rgba(0,0,0,0.28)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.40)"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 100,0 100,28 50,42 0,28" fill="url(#flapShadowGrad)" filter="url(#flapShadowBlur)"/>
    </svg>
    <svg class="fold-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="foldBlur"><feGaussianBlur stdDeviation="0.15"/></filter>
        <filter id="foldShadow"><feGaussianBlur stdDeviation="0.4"/></filter>
      </defs>
      <g class="fold-upper" style="transition: opacity 0.5s ease;">
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(160,130,100,0.10)" stroke-width="1.5" filter="url(#foldShadow)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(160,130,100,0.08)" stroke-width="1.2" filter="url(#foldShadow)"/>
        <line x1="-30" y1="20" x2="50" y2="42" stroke="rgba(190,165,135,0.08)" stroke-width="0.45" filter="url(#foldBlur)"/>
        <line x1="130" y1="20" x2="50" y2="42" stroke="rgba(190,165,135,0.06)" stroke-width="0.4" filter="url(#foldBlur)"/>
        <line x1="-30" y1="19.5" x2="50.2" y2="41.5" stroke="rgba(212,190,160,0.10)" stroke-width="0.3"/>
        <line x1="130" y1="19.5" x2="49.8" y2="41.5" stroke="rgba(212,190,160,0.08)" stroke-width="0.25"/>
      </g>
      <g class="fold-lower">
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(160,130,100,0.06)" stroke-width="0.8" filter="url(#foldShadow)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(160,130,100,0.05)" stroke-width="0.7" filter="url(#foldShadow)"/>
        <line x1="-30" y1="80" x2="50" y2="42" stroke="rgba(190,165,135,0.06)" stroke-width="0.25" filter="url(#foldBlur)"/>
        <line x1="130" y1="80" x2="50" y2="42" stroke="rgba(190,165,135,0.04)" stroke-width="0.2" filter="url(#foldBlur)"/>
        <line x1="-30" y1="80.4" x2="50.2" y2="42.4" stroke="rgba(212,190,160,0.08)" stroke-width="0.2"/>
        <line x1="130" y1="80.4" x2="49.8" y2="42.4" stroke="rgba(212,190,160,0.06)" stroke-width="0.18"/>
      </g>
    </svg>
    <div class="env-flap-wrapper">
      <div class="env-flap"><canvas id="flapTex"></canvas></div>
      <div class="seal" id="seal">
        <div class="seal-pulse"></div>
        <div class="seal-disc">
          <canvas id="sealTex"></canvas>
          <div class="seal-shadow"></div>
          <div class="seal-center-dip"></div>
          <div class="seal-ring"></div>
          <div class="seal-text">Y &amp; W</div>
        </div>
      </div>
    </div>
  </div>
  </div>
  <div class="env-text">這份邀請 專屬於你</div>
  <div class="tap-hint">輕觸封印開啟</div>
</div>
<script>
function makeMarbleTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const bg = ctx.createLinearGradient(0, 0, w * 0.4, h);
  bg.addColorStop(0, `rgb(${baseR+5},${baseG+4},${baseB+3})`);
  bg.addColorStop(0.5, `rgb(${baseR},${baseG},${baseB})`);
  bg.addColorStop(1, `rgb(${baseR-3},${baseG-4},${baseB-3})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  // Layer 1: base noise
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 10;
    d[i] += n + Math.random() * 2;
    d[i+1] += n;
    d[i+2] += n - Math.random();
  }

  // Layer 2: warm splotches
  const cols = [[232,196,160],[212,149,106],[240,230,216],[217,184,160],[225,210,190]];
  for (let s = 0; s < 18; s++) {
    const sx = Math.random() * w, sy = Math.random() * h;
    const sr = 30 + Math.random() * 80;
    const col = cols[Math.floor(Math.random() * cols.length)];
    const str = 0.22 + Math.random() * 0.25;
    for (let dy = -sr; dy < sr; dy++) {
      for (let dx = -sr; dx < sr; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < sr) {
          const px = Math.floor(sx + dx), py = Math.floor(sy + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const f = Math.pow(1 - dist/sr, 2) * str;
            const idx = (py * w + px) * 4;
            d[idx]   += (col[0] - d[idx]) * f;
            d[idx+1] += (col[1] - d[idx+1]) * f;
            d[idx+2] += (col[2] - d[idx+2]) * f;
          }
        }
      }
    }
  }

  // Layer 3: gold veins
  function drawVein(sx, sy, angle, len, width, opacity, isGold) {
    let x = sx, y = sy;
    const cR = isGold ? 225 : 160, cG = isGold ? 190 : 130, cB = isGold ? 140 : 109;
    for (let step = 0; step < len; step++) {
      x += Math.cos(angle) * 2; y += Math.sin(angle) * 2;
      angle += (Math.random() - 0.5) * 0.3;
      const hw = Math.ceil(width / 2);
      for (let t = -hw; t <= hw; t++) {
        const px = Math.floor(x + Math.cos(angle + Math.PI/2) * t);
        const py = Math.floor(y + Math.sin(angle + Math.PI/2) * t);
        if (px >= 0 && px < w && py >= 0 && py < h) {
          const idx = (py * w + px) * 4;
          const a = opacity * (1 - Math.abs(t)/(hw+1));
          d[idx]   += (cR - d[idx]) * a;
          d[idx+1] += (cG - d[idx+1]) * a;
          d[idx+2] += (cB - d[idx+2]) * a;
        }
      }
      if (Math.random() < 0.02 && width > 1) {
        drawVein(x, y, angle + (Math.random()-0.5)*1.2, len*0.3, 1, opacity*0.7, isGold);
      }
    }
  }
  for (let v = 0; v < 14 + Math.floor(Math.random() * 3); v++) {
    const edge = Math.floor(Math.random() * 4);
    let sx, sy, ang;
    if (edge === 0) { sx = 0; sy = Math.random()*h; ang = Math.random()*0.8-0.4; }
    else if (edge === 1) { sx = w; sy = Math.random()*h; ang = Math.PI+Math.random()*0.8-0.4; }
    else if (edge === 2) { sx = Math.random()*w; sy = 0; ang = Math.PI/2+Math.random()*0.8-0.4; }
    else { sx = Math.random()*w; sy = h; ang = -Math.PI/2+Math.random()*0.8-0.4; }
    const vl = 60+Math.random()*120, vw = 2+Math.random()*3, vo = 0.35+Math.random()*0.25;
    drawVein(sx+1, sy+1, ang, vl, vw, vo*0.5, false);
    drawVein(sx, sy, ang, vl, vw, vo, true);
  }

  // Layer 4: luminosity
  for (let i = 0; i < d.length; i += 4) {
    const px = (i/4)%w, py = Math.floor((i/4)/w);
    const shine = (1-px/w)*(1-py/h)*6;
    d[i] += shine; d[i+1] += shine*0.9; d[i+2] += shine*0.8;
  }
  ctx.putImageData(img, 0, 0);
}

const isMobile = window.innerWidth <= 480;
const dpr = Math.min(window.devicePixelRatio || 1, 2);
if (isMobile) {
  const sw = Math.ceil(window.innerWidth * dpr), sh = Math.ceil(window.innerHeight * dpr);
  makeMarbleTexture(document.getElementById('envTex'), sw, sh, 232, 215, 195);
  makeMarbleTexture(document.getElementById('flapTex'), sw, sh, 212, 194, 172);
} else {
  makeMarbleTexture(document.getElementById('envTex'), 880, 620, 232, 215, 195);
  makeMarbleTexture(document.getElementById('flapTex'), 880, 620, 212, 194, 172);
}

// ======== Marble gold seal ========
(function() {
  const c = document.getElementById('sealTex');
  const size = 176; c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2;
  const base = ctx.createRadialGradient(cx-r*0.25,cy-r*0.3,r*0.05, cx+r*0.1,cy+r*0.15,r*1.1);
  base.addColorStop(0,'#f0e6d8'); base.addColorStop(0.3,'#e8d7c3');
  base.addColorStop(0.6,'#d4c2ac'); base.addColorStop(1,'#c0aa90');
  ctx.fillStyle = base; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

  const img = ctx.getImageData(0,0,size,size); const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const px=(i/4)%size, py=Math.floor((i/4)/size);
    if (Math.sqrt((px-cx)**2+(py-cy)**2) > r) continue;
    const n = (Math.random()-0.5)*8;
    d[i]+=n+1; d[i+1]+=n; d[i+2]+=n-0.5;
  }
  // Small gold veins on seal
  for (let v = 0; v < 5; v++) {
    const a0 = Math.random()*Math.PI*2;
    let x = cx+Math.cos(a0)*r*0.3, y = cy+Math.sin(a0)*r*0.3;
    let ang = a0+Math.PI/2+(Math.random()-0.5)*0.5;
    for (let step = 0; step < 30; step++) {
      x += Math.cos(ang)*1.5; y += Math.sin(ang)*1.5;
      ang += (Math.random()-0.5)*0.4;
      const px=Math.floor(x), py=Math.floor(y);
      if (px>=0&&px<size&&py>=0&&py<size&&Math.sqrt((px-cx)**2+(py-cy)**2)<r*0.85) {
        const idx=(py*size+px)*4;
        d[idx]+=(212-d[idx])*0.25; d[idx+1]+=(175-d[idx+1])*0.25; d[idx+2]+=(133-d[idx+2])*0.25;
      }
    }
  }
  ctx.putImageData(img, 0, 0);

  ctx.globalCompositeOperation = 'source-atop';
  const edge = ctx.createRadialGradient(cx-r*0.15,cy-r*0.15,r*0.5, cx+r*0.05,cy+r*0.05,r);
  edge.addColorStop(0,'transparent'); edge.addColorStop(0.4,'rgba(0,0,0,0.03)');
  edge.addColorStop(0.7,'rgba(0,0,0,0.10)'); edge.addColorStop(0.88,'rgba(0,0,0,0.20)');
  edge.addColorStop(1,'rgba(0,0,0,0.30)');
  ctx.fillStyle = edge; ctx.fillRect(0,0,size,size);

  const shimmer = ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,0, cx,cy,r);
  shimmer.addColorStop(0,'rgba(255,240,200,0.12)'); shimmer.addColorStop(0.5,'rgba(212,175,133,0.06)');
  shimmer.addColorStop(1,'transparent');
  ctx.fillStyle = shimmer; ctx.fillRect(0,0,size,size);

  const rim = ctx.createRadialGradient(cx,cy,r*0.74, cx,cy,r*0.86);
  rim.addColorStop(0,'transparent'); rim.addColorStop(0.3,'rgba(212,175,133,0.15)');
  rim.addColorStop(0.6,'rgba(212,175,133,0.22)'); rim.addColorStop(1,'transparent');
  ctx.fillStyle = rim; ctx.fillRect(0,0,size,size);
})();

const scene = document.getElementById('scene');
const seal = document.getElementById('seal');
const btn = document.getElementById('closeBtn');
function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 900);
  setTimeout(() => scene.classList.add('phase-3'), 1600);
}
function closeEnvelope() { scene.classList.remove('phase-3','phase-2','phase-1'); }
seal.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
btn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>
