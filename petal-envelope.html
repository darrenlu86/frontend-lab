<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Petal Envelope — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --env-w: min(88vw, 440px);
    --env-h: calc(var(--env-w) * 0.62);  /* 橫式信封比例 */
  }

  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
    background-color: #d5ccc6;
    background-image: url('natural-paper.png');
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: var(--env-w); height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ======== 信封 ======== */
  .envelope {
    position: relative;
    width: var(--env-w);
    height: var(--env-h);
    perspective: 800px;
    cursor: pointer;
    z-index: 2;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.06))
            drop-shadow(0 6px 16px rgba(0,0,0,0.04));
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1) 0.4s,
                opacity 0.7s ease 0.6s;
  }

  /* ======== 信封底板（矩形信紙） ======== */
  .env-base {
    position: absolute; inset: 0;
    background: #cec3b8;
    border-radius: 3px;
    overflow: hidden;
  }
  .env-base canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .env-base::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12),
                inset 0 -1px 0 rgba(0,0,0,0.03);
    pointer-events: none;
  }

  /* ======== 共用翻瓣 ======== */
  .flap {
    position: absolute;
    left: 0; right: 0;
    width: 100%;
    height: 72%; /* 大於一半，讓兩瓣在中央交疊 */
    overflow: hidden;
    backface-visibility: hidden;
  }
  .flap canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* ======== 下半圓（先折上來，在下層） ======== */
  .flap-bottom {
    bottom: 0;
    clip-path: ellipse(50% 100% at 50% 100%);
    z-index: 1;
    transform-origin: bottom center;
    transition: transform 1.2s cubic-bezier(0.32,0,0.15,1) 0s;
  }
  /* 光影：光源左上 → 下半圓上部偏暗（被上蓋遮擋） */
  .flap-bottom::after {
    content: '';
    position: absolute; inset: 0;
    clip-path: ellipse(50% 100% at 50% 100%);
    background:
      linear-gradient(135deg,
        rgba(0,0,0,0.03) 0%,
        transparent 40%,
        rgba(0,0,0,0.02) 100%),
      linear-gradient(to top,
        rgba(255,255,255,0.04) 0%,
        transparent 30%,
        rgba(0,0,0,0.04) 80%);
    pointer-events: none;
  }

  /* ======== 上半圓（後蓋上去，在上層） ======== */
  .flap-top {
    top: 0;
    clip-path: ellipse(50% 100% at 50% 0%);
    z-index: 2;
    transform-origin: top center;
    transition: transform 1.4s cubic-bezier(0.32,0,0.15,1) 0s;
  }
  /* 光影：光源左上 → 左上亮、右下暗 */
  .flap-top::after {
    content: '';
    position: absolute; inset: 0;
    clip-path: ellipse(50% 100% at 50% 0%);
    background:
      linear-gradient(135deg,
        rgba(255,255,255,0.06) 0%,
        transparent 40%,
        rgba(0,0,0,0.03) 70%,
        rgba(0,0,0,0.06) 100%),
      linear-gradient(to bottom,
        rgba(255,255,255,0.03) 0%,
        transparent 30%,
        rgba(0,0,0,0.03) 90%,
        rgba(0,0,0,0.06) 100%);
    pointer-events: none;
  }
  /* 上蓋底部邊緣陰影（交疊處） */
  .flap-top::before {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%; height: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.06), transparent);
    pointer-events: none;
    z-index: 1;
  }

  /* ======== 愛心扣 ======== */
  .heart-clasp {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1),
                opacity 0.3s ease;
  }
  /* SVG 愛心 — 乾淨的尖端朝下心形 */
  .heart-svg {
    width: 32px; height: 30px;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.12));
  }
  .heart-svg path {
    fill: #e0d8d0;
    stroke: none;
  }
  /* 光源左上：左上亮、右下暗 */
  .heart-svg::after {
    content: '';
    position: absolute; inset: 0;
  }
  .heart-pulse {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(180,170,160,0.2);
    animation: heartPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes heartPulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.2); opacity: 0; }
  }

  /* ======== 文字 ======== */
  .env-text {
    text-align: center;
    color: rgba(70,45,35,0.72);
    font-size: 13.5px; font-weight: 300;
    letter-spacing: 3px; margin-top: 24px;
    transition: opacity 0.5s ease;
  }
  .hint-text {
    text-align: center; font-size: 10.5px;
    color: rgba(70,45,35,0.48);
    letter-spacing: 2px; margin-top: 8px;
    animation: fadeHint 3s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* ======== 卡片 ======== */
  .card {
    position: absolute;
    width: calc(var(--env-w) - 24px);
    padding: 36px 28px;
    border-radius: 2px;
    background-color: #f5efe8;
    background-image: url('cream-paper.png');
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; z-index: 1; pointer-events: none;
    transform: translateY(30px) scale(0.92);
    transition: opacity 0.9s ease 0.8s,
                transform 1s cubic-bezier(0.25,0.46,0.45,0.94) 0.8s,
                box-shadow 0.8s ease 1s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-border {
    position: absolute; inset: 12px;
    border: 1px solid rgba(190,160,115,0.12);
    pointer-events: none;
  }
  .card-border::before {
    content: ''; position: absolute; inset: 4px;
    border: 0.5px solid rgba(190,160,115,0.06);
  }
  .card-ornament {
    width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,150,110,0.2), transparent);
    margin-bottom: 22px;
  }
  .card-names {
    font-size: 25px; font-weight: 300;
    color: #4a3830; text-align: center;
    line-height: 1.8; letter-spacing: 4px;
  }
  .card-and {
    font-style: italic; font-size: 15px;
    color: rgba(180,150,110,0.4);
    letter-spacing: 2px; font-weight: 400;
  }
  .card-details {
    margin-top: 22px; text-align: center;
    color: #7a6558; font-size: 12px;
    font-weight: 300; letter-spacing: 2px; line-height: 2.2;
  }
  .card-footer {
    font-size: 9px; margin-top: 24px;
    color: rgba(138,112,96,0.2);
    letter-spacing: 4px; text-transform: uppercase;
  }

  /* ======== Close ======== */
  .close-btn {
    position: fixed; top: 24px; right: 24px;
    background: none; border: none;
    color: rgba(80,55,45,0.3);
    font-size: 12px; letter-spacing: 3px;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease 1.8s;
    font-family: 'Cormorant Garamond', serif; z-index: 20;
  }
  .close-btn:hover { color: rgba(80,55,45,0.5); }

  /* ========================================================
     開啟動畫
     Phase 1: 愛心扣消失
     Phase 2: 上蓋向後翻開
     Phase 3: 下蓋向下翻開
     Phase 4: 信封退場 + 卡片進場
     ======================================================== */

  .scene.phase-1 .heart-clasp {
    transform: translate(-50%, -50%) scale(0.2) translateY(-20px);
    opacity: 0;
    pointer-events: none;
  }
  .scene.phase-1 .heart-pulse { animation: none; opacity: 0; }

  .scene.phase-2 .flap-top {
    transform: rotateX(170deg);
  }

  .scene.phase-3 .flap-bottom {
    transform: rotateX(-170deg);
  }
  /* 下蓋翻開後退場 */
  .scene.phase-3 .envelope {
    transform: translateY(40px) scale(0.9);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1) 0.5s,
                opacity 0.5s ease 0.5s;
  }
  .scene.phase-3 .card {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
    z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12),
                0 2px 8px rgba(0,0,0,0.06);
  }
  .scene.phase-3 .env-text,
  .scene.phase-3 .hint-text { opacity: 0; pointer-events: none; }
  .scene.phase-3 .close-btn { opacity: 1; pointer-events: auto; }

  /* ======== 手機版 ======== */
  @media (max-width: 480px) {
    :root { --env-w: 88vw; }
    body {
      background-color: #c9bdb3;
      background-image: none;
    }
    .heart-clasp {
      width: 40px; height: 40px;
    }
    .heart-shape::before,
    .heart-shape::after {
      width: 20px; height: 32px;
      border-radius: 20px 20px 0 0;
    }
  }
</style>
</head>
<body>

<button class="close-btn" id="closeBtn">CLOSE</button>

<div class="scene" id="scene">
  <!-- 卡片 -->
  <div class="card" id="card">
    <div class="card-border"></div>
    <div class="card-ornament"></div>
    <div class="card-names">
      YU CHEN
      <div class="card-and">&amp;</div>
      WEI TING
    </div>
    <div class="card-details">
      <div>二〇二六年 十月 十七日</div>
      <div>週六 午間十二時</div>
      <div style="margin-top:8px">台北 君悅酒店</div>
      <div>Grand Ballroom</div>
    </div>
    <div class="card-footer">WEDDING INVITATION</div>
  </div>

  <!-- 信封 -->
  <div class="envelope" id="envelope">
    <!-- 矩形信紙底板 -->
    <div class="env-base">
      <canvas id="baseTex"></canvas>
    </div>

    <!-- 下半圓 -->
    <div class="flap flap-bottom">
      <canvas id="bottomTex"></canvas>
    </div>

    <!-- 上半圓 -->
    <div class="flap flap-top">
      <canvas id="topTex"></canvas>
    </div>

    <!-- 愛心扣 -->
    <div class="heart-clasp" id="heartClasp">
      <div class="heart-pulse"></div>
      <svg class="heart-svg" viewBox="0 0 32 30">
        <path d="M16 28 C16 28 2 20 2 10 A7 7 0 0 1 16 6 A7 7 0 0 1 30 10 C30 20 16 28 16 28Z"/>
      </svg>
    </div>
  </div>

  <div class="env-text">這份邀請 專屬於你</div>
  <div class="hint-text">輕觸愛心開啟</div>
</div>

<script>
// ======== 紙張紋理 ========
function makePaperTexture(canvas, w, h, baseR, baseG, baseB) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, w, h);

  const g = ctx.createLinearGradient(0, 0, w * 0.4, h);
  g.addColorStop(0, 'rgba(255,255,255,0.03)');
  g.addColorStop(1, 'rgba(0,0,0,0.02)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 18;
    d[i] += n; d[i+1] += n; d[i+2] += n;
  }
  for (let f = 0; f < 800; f++) {
    const fx = Math.random() * w, fy = Math.random() * h;
    const len = 6 + Math.random() * 28;
    const br = (Math.random() - 0.5) * 14;
    for (let p = 0; p < len; p++) {
      const px = Math.floor(fx + p + (Math.random() - 0.5) * 2);
      const py = Math.floor(fy + (Math.random() - 0.5) * 1.5);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const idx = (py * w + px) * 4;
        d[idx] += br; d[idx+1] += br; d[idx+2] += br;
      }
    }
  }
  for (let b = 0; b < 30; b++) {
    const bx = Math.random() * w, by = Math.random() * h;
    const bR = 10 + Math.random() * 30;
    const bBr = (Math.random() - 0.5) * 8;
    for (let dy = -bR; dy < bR; dy++) {
      for (let dx = -bR; dx < bR; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bR) {
          const px = Math.floor(bx + dx), py = Math.floor(by + dy);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            const falloff = 1 - dist / bR;
            const idx = (py * w + px) * 4;
            const v = bBr * falloff * falloff;
            d[idx] += v; d[idx+1] += v; d[idx+2] += v;
          }
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

const dpr = Math.min(window.devicePixelRatio || 1, 2);
const envEl = document.getElementById('envelope');
const envW = Math.ceil(envEl.offsetWidth * dpr);
const envH = Math.ceil(envEl.offsetHeight * dpr);
const flapH = Math.ceil(envH * 0.72);

makePaperTexture(document.getElementById('baseTex'), envW, envH, 201, 189, 179);
makePaperTexture(document.getElementById('bottomTex'), envW, flapH, 198, 186, 176);
makePaperTexture(document.getElementById('topTex'), envW, flapH, 206, 195, 184);

// ======== 互動 ========
const scene = document.getElementById('scene');
const heart = document.getElementById('heartClasp');
const closeBtn = document.getElementById('closeBtn');

function openEnvelope() {
  scene.classList.add('phase-1');
  setTimeout(() => scene.classList.add('phase-2'), 300);
  setTimeout(() => scene.classList.add('phase-3'), 1000);
}

function closeEnvelope() {
  scene.classList.remove('phase-3');
  setTimeout(() => scene.classList.remove('phase-2'), 300);
  setTimeout(() => scene.classList.remove('phase-1'), 700);
}

document.getElementById('envelope').addEventListener('click', e => {
  e.stopPropagation();
  openEnvelope();
});
closeBtn.addEventListener('click', e => {
  e.stopPropagation();
  closeEnvelope();
});
</script>
</body>
</html>
